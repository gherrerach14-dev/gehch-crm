// ── Google Calendar ───────────────────────────────────────────────────────────
const abrirGoogleCalendar = (titulo, fecha, descripcion) => {
  const fechaGCal = fecha.replace(/-/g,""); // YYYYMMDD
  const fechaFin  = (() => {
    const d = new Date(fecha+"T00:00:00");
    d.setDate(d.getDate()+1);
    return d.toISOString().split("T")[0].replace(/-/g,"");
  })();
  const params = new URLSearchParams({
    action: "TEMPLATE",
    text:   titulo,
    dates:  `${fechaGCal}/${fechaFin}`,
    details: descripcion,
    reminder: "1440", // 24 horas antes
  });
  window.open(`https://calendar.google.com/calendar/render?${params.toString()}`, "_blank");
};

// ── persistencia localStorage ─────────────────────────────────────────────────
const guardar = (k, v) => {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){}
  try { if(window.fbGuardar) window.fbGuardar(k, v); } catch(e){}
};
const cargar  = (k, def) => { try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : def; } catch(e){ return def; } };
const cargarNube = async (k, def) => {
  try { if(window.fbCargar){ const r=await window.fbCargar(k); if(r!==null){ try{localStorage.setItem(k,JSON.stringify(r));}catch(e){} return r; } } } catch(e){}
  return cargar(k, def);
};

// ── utilidades ────────────────────────────────────────────────────────────────
const hoy = () => { const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
const fmt  = (f) => { if(!f) return "—"; const [y,m,d]=f.split("-"); return `${d}/${m}/${y}`; };
const diasHasta = (f) => { if(!f) return 9999; const h=new Date(); h.setHours(0,0,0,0); return Math.round((new Date(f+"T00:00:00")-h)/86400000); };
const cumpleAnio = (c) => {
  if(!c) return null;
  const [,m,d] = c.split("-");
  const hoyD = new Date(); hoyD.setHours(0,0,0,0);
  const esteAnio = new Date(`${hoyD.getFullYear()}-${m}-${d}T00:00:00`);
  if(esteAnio < hoyD) {
    return `${hoyD.getFullYear()+1}-${m}-${d}`;
  }
  return `${hoyD.getFullYear()}-${m}-${d}`;
};
const moneda = (m, curr) => curr==="USD" ? `US$ ${Number(m).toLocaleString("es-DO",{minimumFractionDigits:2})}` : `RD$ ${Number(m).toLocaleString("es-DO",{minimumFractionDigits:2})}`;
const edadAnios = (nac) => { if(!nac) return "—"; const hoyD=new Date(); const nacD=new Date(nac); let edad=hoyD.getFullYear()-nacD.getFullYear(); if(hoyD.getMonth()<nacD.getMonth()||(hoyD.getMonth()===nacD.getMonth()&&hoyD.getDate()<nacD.getDate())) edad--; return edad+" años"; };

const generarCuotas = (polizaId, inicio, frecuencia, primaTotal) => {
  const meses = FREC_MESES[frecuencia]; const numCuotas = 12/meses; const montoCuota = primaTotal/numCuotas; const cuotas = [];
  const [anioI, mesI, diaI] = inicio.split("-").map(Number);
  for(let i=0; i<numCuotas; i++){
    // Calcular año y mes sumando meses exactos sin desbordamiento de días
    let mesTotal = mesI - 1 + meses * i; // mes en base 0
    let anio = anioI + Math.floor(mesTotal / 12);
    let mes  = mesTotal % 12 + 1; // mes en base 1
    // Respetar el día original; si el mes no tiene ese día usar el último día del mes
    const diasEnMes = new Date(anio, mes, 0).getDate();
    const dia = Math.min(diaI, diasEnMes);
    const fecha = `${anio}-${String(mes).padStart(2,"0")}-${String(dia).padStart(2,"0")}`;
    cuotas.push({ id:Date.now()+i+Math.random()*1000, polizaId, numero:i+1, total:numCuotas, fecha, monto:montoCuota, estado:"Pendiente", fechaPago:null, notaPago:"" });
  }
  return cuotas;
};

// ═══ MODAL RENOVACIÓN ════════════════════════════════════════════════════════
function ModalRenovacion({ pol, clientes, setPolizas, setPlanes, onClose }) {
  const cli = clientes.find(c => c.id === pol.clienteId);
  const [paso, setPaso] = useState(1); // 1=datos, 2=autorización, 3=confirmación
  const [form, setForm] = useState({
    nuevaPrima: pol.prima,
    moneda: pol.moneda,
    frecuencia: pol.frecuencia || "Mensual",
    huboSiniestros: "No",
    notaSiniestro: "",
    notaRenovacion: "",
    autorizado: null,
    motivoNoRenovacion: "",
  });
  const F = (k, v) => setForm(f => ({ ...f, [k]: v }));

  // Calcular nuevas fechas (1 año después)
  const nuevaInicio = pol.fin;
  const calcFin = () => {
    const [y, m, d] = pol.fin.split("-").map(Number);
    return `${y+1}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  };
  const nuevaFin = calcFin();
  const aumentoPct = pol.prima > 0 ? (((Number(form.nuevaPrima) - pol.prima) / pol.prima) * 100).toFixed(1) : 0;

  const confirmarRenovacion = () => {
    if(form.autorizado === "si") {
      // Marcar póliza actual como Renovada
      const newId = Date.now();
      setPolizas(prev => prev.map(p => p.id === pol.id
        ? { ...p, estado: "Renovada", notaRenovacion: form.notaRenovacion, huboSiniestros: form.huboSiniestros, notaSiniestro: form.notaSiniestro }
        : p
      ));
      // Crear nueva póliza para el período siguiente
      const nuevaPol = {
        ...pol,
        id: newId,
        inicio: nuevaInicio,
        fin: nuevaFin,
        prima: Number(form.nuevaPrima),
        moneda: form.moneda,
        frecuencia: form.frecuencia,
        cuotasPersonalizadas: Number(form.cuotasPersonalizadas||0),
        estado: "Vigente",
        notaRenovacion: "",
        periodoAnterior: pol.id,
        notas: `Renovación de póliza ${pol.numero}. ${form.notaRenovacion}`,
      };
      setPolizas(prev => [...prev, nuevaPol]);
      // Generar nuevas cuotas según frecuencia
      if(form.frecuencia==="Personalizado"&&form.cuotasPersonalizadas){
        const numCuotas=Number(form.cuotasPersonalizadas);
        const montoCuota=Number(form.nuevaPrima)/numCuotas;
        const cuotas=[];
        const [anioI,mesI,diaI]=nuevaInicio.split("-").map(Number);
        for(let i=0;i<numCuotas;i++){
          let mesTotal=mesI-1+i;
          let anio=anioI+Math.floor(mesTotal/12);
          let mes=mesTotal%12+1;
          const diasEnMes=new Date(anio,mes,0).getDate();
          const dia=Math.min(diaI,diasEnMes);
          const fecha=anio+"-"+String(mes).padStart(2,"0")+"-"+String(dia).padStart(2,"0");
          cuotas.push({id:Date.now()+i+Math.random()*1000,polizaId:newId,numero:i+1,total:numCuotas,fecha,monto:montoCuota,estado:"Pendiente",fechaPago:null,notaPago:""});
        }
        setPlanes(prev=>[...prev,...cuotas]);
      } else {
        setPlanes(prev => [...prev, ...generarCuotas(newId, nuevaInicio, form.frecuencia, Number(form.nuevaPrima))]);
      }
      setPaso(3);
    } else {
      // No renovar - marcar como No Renovada
      setPolizas(prev => prev.map(p => p.id === pol.id
        ? { ...p, estado: "No Renovada", motivoNoRenovacion: form.motivoNoRenovacion }
        : p
      ));
      setPaso(3);
    }
  };

  return (
    <Modal titulo={`Renovación — ${pol.numero}`} onClose={onClose} wide>
      {/* Encabezado cliente */}
      <div style={{background:"#f8f9fa",borderRadius:10,padding:"12px 16px",marginBottom:20,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontWeight:700,fontSize:15,color:"#0a0a1a"}}>{cli?.nombre} {cli?.apellido}</div>
          <div style={{fontSize:12,color:"#888",marginTop:2}}>{pol.aseguradora} · {pol.ramo} · {pol.numero}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:12,color:"#888"}}>Período actual</div>
          <div style={{fontSize:13,fontWeight:600,color:"#0a0a1a"}}>{fmt(pol.inicio)} → {fmt(pol.fin)}</div>
          <div style={{fontSize:13,fontWeight:700,color:"#d97706"}}>{moneda(pol.prima, pol.moneda)}</div>
        </div>
      </div>

      {/* Pasos */}
      <div style={{display:"flex",gap:0,marginBottom:24}}>
        {["Datos de renovación","Autorización","Resultado"].map((s,i)=>{
          const activo = paso === i+1; const completado = paso > i+1;
          return <div key={s} style={{flex:1,textAlign:"center"}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:completado?"#16a34a":activo?"#0a1628":"#e5e7eb",color:completado||activo?"#fff":"#aaa",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 4px",fontSize:13,fontWeight:700}}>{completado?"✓":i+1}</div>
            <div style={{fontSize:11,color:activo?"#0a0a1a":"#aaa",fontWeight:activo?700:400}}>{s}</div>
          </div>;
        })}
      </div>

      {/* PASO 1: Datos */}
      {paso===1 && <div>
        <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:"12px 16px",marginBottom:18,fontSize:13,color:"#92400e"}}>
          📋 Ingresa los datos de la renovación para el período <strong>{fmt(nuevaInicio)} → {fmt(nuevaFin)}</strong>
        </div>
        <Row>
          <Campo label="Nueva Prima *" half>
            <Inp type="number" value={form.nuevaPrima} onChange={e=>F("nuevaPrima",e.target.value)}/>
          </Campo>
          <Campo label="Moneda" half>
            <Sel value={form.moneda} onChange={e=>F("moneda",e.target.value)}>
              <option value="RD$">Pesos Dominicanos (RD$)</option>
              <option value="USD">Dólares Americanos (USD)</option>
            </Sel>
          </Campo>
        </Row>
        {form.nuevaPrima && Number(form.nuevaPrima) !== pol.prima && (
          <div style={{marginBottom:14,padding:"8px 12px",background: Number(form.nuevaPrima)>pol.prima?"#fff5f5":"#f0fdf4",borderRadius:8,fontSize:13,color:Number(form.nuevaPrima)>pol.prima?"#dc2626":"#16a34a",fontWeight:600}}>
            {Number(form.nuevaPrima)>pol.prima?"📈":"📉"} Variación de prima: {Number(form.nuevaPrima)>pol.prima?"+":""}{aumentoPct}% ({moneda(Math.abs(Number(form.nuevaPrima)-pol.prima),pol.moneda)})
          </div>
        )}
        <Campo label="Frecuencia de Pago">
          <Sel value={form.frecuencia} onChange={e=>F("frecuencia",e.target.value)}>
            {FRECUENCIAS.map(f=><option key={f}>{f}</option>)}
            <option value="Personalizado">Personalizado</option>
          </Sel>
          {form.frecuencia==="Personalizado"&&<div style={{marginTop:8}}>
            <label style={{fontSize:11,fontWeight:700,color:"#666",textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:4}}>Número de cuotas mensuales *</label>
            <input type="number" min="1" max="24" value={form.cuotasPersonalizadas||""} onChange={e=>F("cuotasPersonalizadas",e.target.value)} placeholder="Ej: 5, 6, 7..." style={{width:"100%",padding:"8px 11px",border:"1.5px solid #e5e7eb",borderRadius:8,fontSize:13,outline:"none",boxSizing:"border-box"}}/>
            {form.nuevaPrima&&form.cuotasPersonalizadas&&<div style={{marginTop:6,padding:"8px 12px",background:"#f0fdf4",borderRadius:8,fontSize:12,color:"#166534"}}>💡 Se generarán <strong>{form.cuotasPersonalizadas}</strong> cuotas mensuales de <strong>{moneda(Number(form.nuevaPrima)/Number(form.cuotasPersonalizadas),form.moneda||"RD$")}</strong> cada una</div>}
          </div>}
        </Campo>
        <Row>
          <Campo label="¿Hubo siniestros en el período?" half>
            <Sel value={form.huboSiniestros} onChange={e=>F("huboSiniestros",e.target.value)}>
              <option>No</option>
              <option>Sí</option>
            </Sel>
          </Campo>
        </Row>
        {form.huboSiniestros==="Sí" && (
          <Campo label="Detalle del siniestro">
            <Txta value={form.notaSiniestro} onChange={e=>F("notaSiniestro",e.target.value)} placeholder="Descripción del siniestro ocurrido..."/>
          </Campo>
        )}
        <Campo label="Nota interna de renovación">
          <Txta value={form.notaRenovacion} onChange={e=>F("notaRenovacion",e.target.value)} placeholder="Observaciones sobre esta renovación..."/>
        </Campo>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>
          <Btn sec onClick={onClose}>Cancelar</Btn>
          <Btn onClick={()=>setPaso(2)}>Continuar →</Btn>
        </div>
      </div>}

      {/* PASO 2: Autorización */}
      {paso===2 && <div>
        <div style={{background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:10,padding:"14px 16px",marginBottom:20,fontSize:13}}>
          <div style={{fontWeight:700,color:"#0369a1",marginBottom:8}}>Resumen de la renovación</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {[
              ["Nuevo período", `${fmt(nuevaInicio)} → ${fmt(nuevaFin)}`],
              ["Prima anterior", moneda(pol.prima, pol.moneda)],
              ["Nueva prima", moneda(Number(form.nuevaPrima), form.moneda)],
              ["Variación", `${aumentoPct}%`],
              ["Frecuencia", form.frecuencia],
              ["Siniestros", form.huboSiniestros],
            ].map(([k,v])=><div key={k}><span style={{color:"#888",fontSize:11}}>{k}: </span><span style={{fontWeight:600,color:"#0a0a1a"}}>{v}</span></div>)}
          </div>
        </div>
        <div style={{fontSize:14,fontWeight:700,color:"#0a0a1a",marginBottom:14}}>¿El asegurado autoriza la renovación?</div>
        <div style={{display:"flex",gap:12,marginBottom:20}}>
          <div onClick={()=>F("autorizado","si")} style={{flex:1,padding:"20px 16px",borderRadius:12,border:`2px solid ${form.autorizado==="si"?"#16a34a":"#e5e7eb"}`,background:form.autorizado==="si"?"#f0fdf4":"#fff",cursor:"pointer",textAlign:"center",transition:"all .15s"}}>
            <div style={{fontSize:28,marginBottom:6}}>✅</div>
            <div style={{fontWeight:700,color:"#16a34a",fontSize:15}}>Sí, autoriza</div>
            <div style={{fontSize:12,color:"#888",marginTop:4}}>Se crea el nuevo período {fmt(nuevaInicio)} → {fmt(nuevaFin)}</div>
          </div>
          <div onClick={()=>F("autorizado","no")} style={{flex:1,padding:"20px 16px",borderRadius:12,border:`2px solid ${form.autorizado==="no"?"#dc2626":"#e5e7eb"}`,background:form.autorizado==="no"?"#fff5f5":"#fff",cursor:"pointer",textAlign:"center",transition:"all .15s"}}>
            <div style={{fontSize:28,marginBottom:6}}>❌</div>
            <div style={{fontWeight:700,color:"#dc2626",fontSize:15}}>No renueva</div>
            <div style={{fontSize:12,color:"#888",marginTop:4}}>La póliza queda marcada como No Renovada</div>
          </div>
        </div>
        {form.autorizado==="no" && (
          <Campo label="Motivo de no renovación">
            <Txta value={form.motivoNoRenovacion} onChange={e=>F("motivoNoRenovacion",e.target.value)} placeholder="¿Por qué el cliente no renueva? Precio, cambio de aseguradora, cancelación..."/>
          </Campo>
        )}
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>
          <Btn sec onClick={()=>setPaso(1)}>← Atrás</Btn>
          <Btn onClick={confirmarRenovacion} success={form.autorizado==="si"} danger={form.autorizado==="no"} sec={!form.autorizado}>
            {form.autorizado==="si"?"✅ Confirmar Renovación":form.autorizado==="no"?"❌ Confirmar No Renovación":"Seleccione una opción"}
          </Btn>
        </div>
      </div>}

      {/* PASO 3: Resultado */}
      {paso===3 && <div style={{textAlign:"center",padding:"20px 0"}}>
        {form.autorizado==="si" ? <>
          <div style={{fontSize:52,marginBottom:12}}>🎉</div>
          <div style={{fontSize:20,fontWeight:800,color:"#16a34a",marginBottom:8}}>¡Renovación exitosa!</div>
          <div style={{fontSize:14,color:"#555",marginBottom:20}}>Se creó el nuevo período <strong>{fmt(nuevaInicio)} → {fmt(nuevaFin)}</strong> con una prima de <strong>{moneda(Number(form.nuevaPrima),form.moneda)}</strong> y se generaron las cuotas automáticamente.</div>
        </> : <>
          <div style={{fontSize:52,marginBottom:12}}>📋</div>
          <div style={{fontSize:20,fontWeight:800,color:"#d97706",marginBottom:8}}>Registrado como No Renovado</div>
          <div style={{fontSize:14,color:"#555",marginBottom:20}}>La póliza quedó marcada como <strong>No Renovada</strong>. El cliente aparecerá en el reporte de oportunidades.</div>
        </>}
        <Btn onClick={onClose}>Cerrar</Btn>
      </div>}
    </Modal>
  );
}

const USUARIO = "gherrera";
const CLAVE   = "Klodomiro1234";

function Login({ onLogin }) {
  const [user, setUser]   = useState("");
  const [pass, setPass]   = useState("");
  const [error, setError] = useState("");
  const [showPass, setShowPass] = useState(false);

  const intentar = () => {
    if(user === USUARIO && pass === CLAVE) {
      onLogin();
    } else {
      setError("Usuario o contraseña incorrectos.");
      setTimeout(() => setError(""), 3000);
    }
  };

  return (
    <div style={{minHeight:"100vh",background:"#0a1628",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:20,padding:"40px 36px",width:"100%",maxWidth:400,boxShadow:"0 24px 64px rgba(0,0,0,0.4)"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <img src={LOGO_SRC} style={{width:180,display:"block",margin:"0 auto 16px"}} alt="GEHCH"/>
          <div style={{fontSize:13,color:"#888",fontWeight:500}}>Sistema de Gestión · Acceso Seguro</div>
        </div>
        <div style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:"#555",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>Usuario</label>
          <input value={user} onChange={e=>setUser(e.target.value)} placeholder="Ingrese su usuario" onKeyDown={e=>e.key==="Enter"&&intentar()}
            style={{width:"100%",padding:"10px 14px",border:"1.5px solid #e5e7eb",borderRadius:9,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
        </div>
        <div style={{marginBottom:24}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:"#555",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>Contraseña</label>
          <div style={{position:"relative"}}>
            <input value={pass} onChange={e=>setPass(e.target.value)} type={showPass?"text":"password"} placeholder="Ingrese su contraseña" onKeyDown={e=>e.key==="Enter"&&intentar()}
              style={{width:"100%",padding:"10px 40px 10px 14px",border:"1.5px solid #e5e7eb",borderRadius:9,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
            <button onClick={()=>setShowPass(!showPass)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"#888",fontSize:16}}>
              {showPass?"🙈":"👁️"}
            </button>
          </div>
        </div>
        {error && <div style={{background:"#fff5f5",border:"1px solid #fecaca",borderRadius:8,padding:"8px 12px",marginBottom:16,fontSize:13,color:"#dc2626",textAlign:"center",fontWeight:600}}>{error}</div>}
        <button onClick={intentar} style={{width:"100%",padding:"12px",background:"#0a1628",color:"#fff",border:"none",borderRadius:10,fontSize:15,fontWeight:700,cursor:"pointer",transition:"opacity .15s"}}
          onMouseEnter={e=>e.currentTarget.style.opacity=".85"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
          Ingresar al Sistema
        </button>
        <div style={{textAlign:"center",marginTop:20,fontSize:11,color:"#bbb"}}>🛡️ CRM GEHCH · Correduría y Asesoría de Seguros</div>
      </div>
    </div>
  );
}

// ═══ DASHBOARD ═══════════════════════════════════════════════════════════════
function Dashboard({ clientes, polizas, planes, recordatorios, setRecordatorios }) {
  const porVencer  = polizas.filter(p=>{ const d=diasHasta(p.fin); return d>=0&&d<=60&&p.estado!=="Cancelada"; });
  const porVencer30 = polizas.filter(p=>{ const d=diasHasta(p.fin); return d>=0&&d<=30&&p.estado!=="Cancelada"; });
  const porVencer60 = polizas.filter(p=>{ const d=diasHasta(p.fin); return d>30&&d<=60&&p.estado!=="Cancelada"; });
  const cuotasProx = planes.filter(p=>{ const d=diasHasta(p.fecha); return d>=0&&d<=15&&p.estado==="Pendiente"; });
  const cuotasVenc = planes.filter(p=>diasHasta(p.fecha)<0&&p.estado==="Pendiente");
  const cumplesMes = clientes.filter(c=>{ if(!c.nacimiento) return false; const d=diasHasta(cumpleAnio(c.nacimiento)); return d>=0&&d<=30; });
  const recsHoy    = recordatorios.filter(r=>!r.completado && diasHasta(r.fecha)<=0);

  const KPI = ({ label, val, color, icon, sub }) => (
    <div style={{background:"#fff",borderRadius:14,padding:"16px 18px",boxShadow:"0 2px 12px rgba(0,0,0,0.05)",border:"1px solid #f0f0f0",display:"flex",gap:12,alignItems:"center"}}>
      <div style={{width:42,height:42,borderRadius:11,background:color+"18",color,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon n={icon} size={19}/></div>
      <div>
        <div style={{fontSize:24,fontWeight:800,color:"#0a0a1a",lineHeight:1}}>{val}</div>
        <div style={{fontSize:12,color:"#888",marginTop:2}}>{label}</div>
        {sub && <div style={{fontSize:11,color,fontWeight:600,marginTop:1}}>{sub}</div>}
      </div>
    </div>
  );

  const Item = ({ border, children }) => (
    <div style={{borderLeft:`3px solid ${border}`,paddingLeft:10,marginBottom:12}}>{children}</div>
  );

  return (
    <div>
      <div style={{marginBottom:22}}>
        <h2 style={{fontSize:22,fontWeight:900,color:"#0a0a1a",margin:0}}>Dashboard</h2>
        <p style={{color:"#888",fontSize:13,margin:"3px 0 0"}}>Resumen general · {new Date().toLocaleDateString("es-DO",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10,marginBottom:22}}>
        <KPI label="Clientes" val={clientes.length} color="#6366f1" icon="cli"/>
        <KPI label="Pólizas vigentes" val={polizas.filter(p=>p.estado==="Vigente").length} color="#16a34a" icon="pol"/>
        <KPI label="Vence ≤30d 🚨" val={porVencer30.length} color="#dc2626" icon="alert" sub={porVencer30.length>0?"¡Urgente!":""}/>
        <KPI label="Vence ≤60d ⚠️" val={porVencer60.length} color="#d97706" icon="alert" sub={porVencer60.length>0?"Gestionar":""}/>
        <KPI label="Cuotas próximas" val={cuotasProx.length} color="#0ea5e9" icon="pago" sub="Próximos 15 días"/>
        <KPI label="Cuotas vencidas" val={cuotasVenc.length} color="#dc2626" icon="money"/>
        <KPI label="Cumpleaños (30d)" val={cumplesMes.length} color="#ec4899" icon="cumple"/>
        <KPI label="Recordatorios hoy" val={recsHoy.length} color="#8b5cf6" icon="bell"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:14}}>
        <SeccionCard titulo="Pólizas por vencer (60 días)" color="#d97706" icon="alert" count={porVencer.length} empty="✅ Sin pólizas por vencer">
          {porVencer.length>0 && porVencer.slice(0,5).map(p=>{ const cli=clientes.find(c=>c.id===p.clienteId); const d=diasHasta(p.fin); return <Item key={p.id} border={d<=30?"#dc2626":"#d97706"}><div style={{fontWeight:600,fontSize:13}}>{cli?.nombre} {cli?.apellido}</div><div style={{fontSize:11,color:"#888"}}>{p.ramo} · {p.aseguradora}</div><div style={{fontSize:11,color:d<=30?"#dc2626":"#d97706",fontWeight:600}}>{d<=30?"🚨":"⚠️"} Vence en {d} día{d!==1?"s":""}</div></Item>; })}
        </SeccionCard>
        <SeccionCard titulo="Cuotas próximas (15d)" color="#0ea5e9" icon="pago" count={cuotasProx.length} empty="✅ Sin cuotas próximas">
          {cuotasProx.length>0 && cuotasProx.slice(0,5).map(cu=>{ const pol=polizas.find(p=>p.id===cu.polizaId); const cli=clientes.find(c=>c.id===pol?.clienteId); const d=diasHasta(cu.fecha); return <Item key={cu.id} border="#0ea5e9"><div style={{fontWeight:600,fontSize:13}}>{cli?.nombre} {cli?.apellido}</div><div style={{fontSize:11,color:"#888"}}>{pol?.ramo} · Cuota {cu.numero}/{cu.total}</div><div style={{fontSize:11,color:"#0ea5e9",fontWeight:600}}>{moneda(cu.monto,pol?.moneda)} · {d===0?"Hoy":`En ${d}d`}</div><button onClick={()=>abrirGoogleCalendar(`💰 Pago Cuota ${cu.numero}/${cu.total} - ${pol?.aseguradora}`,cu.fecha,`Cliente: ${cli?.nombre} ${cli?.apellido}\nPóliza: ${pol?.numero}\nMonto: ${moneda(cu.monto,pol?.moneda)}`)} style={{marginTop:4,padding:"3px 8px",borderRadius:6,border:"1px solid #4285f4",background:"#fff",color:"#4285f4",cursor:"pointer",fontSize:10,fontWeight:700}}>📅 Google Cal</button></Item>; })}
        </SeccionCard>
        <SeccionCard titulo="Cuotas vencidas sin pagar" color="#dc2626" icon="money" count={cuotasVenc.length} empty="✅ Todo al día">
          {cuotasVenc.length>0 && cuotasVenc.slice(0,5).map(cu=>{ const pol=polizas.find(p=>p.id===cu.polizaId); const cli=clientes.find(c=>c.id===pol?.clienteId); const d=Math.abs(diasHasta(cu.fecha)); return <Item key={cu.id} border="#dc2626"><div style={{fontWeight:600,fontSize:13}}>{cli?.nombre} {cli?.apellido}</div><div style={{fontSize:11,color:"#888"}}>{pol?.ramo} · Cuota {cu.numero}/{cu.total}</div><div style={{fontSize:11,color:"#dc2626",fontWeight:600}}>{moneda(cu.monto,pol?.moneda)} · Hace {d}d</div></Item>; })}
        </SeccionCard>
        <SeccionCard titulo="Cumpleaños próximos" color="#ec4899" icon="cumple" count={cumplesMes.length} empty="Sin cumpleaños próximos">
          {cumplesMes.length>0 && cumplesMes.map(c=>{ const d=diasHasta(cumpleAnio(c.nacimiento)); return <Item key={c.id} border="#ec4899"><div style={{fontWeight:600,fontSize:13}}>{c.nombre} {c.apellido}</div><div style={{fontSize:11,color:"#888"}}>{fmt(c.nacimiento)} · {edadAnios(c.nacimiento)}</div><div style={{fontSize:11,color:"#ec4899",fontWeight:600}}>{d===0?"🎂 ¡Hoy!":`En ${d} días`}</div></Item>; })}
        </SeccionCard>
        <SeccionCard titulo="Recordatorios pendientes" color="#8b5cf6" icon="bell" count={recsHoy.length} empty="Sin recordatorios para hoy">
          {recsHoy.length>0 && recsHoy.map(r=>{ const cli=clientes.find(c=>c.id===r.clienteId); return <div key={r.id} style={{borderLeft:"3px solid #8b5cf6",paddingLeft:10,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontWeight:600,fontSize:13}}>{r.titulo}</div><div style={{fontSize:11,color:"#888"}}>{cli?.nombre} {cli?.apellido}</div></div>
            <Btn sm success onClick={()=>setRecordatorios(p=>p.map(x=>x.id===r.id?{...x,completado:true}:x))}><Icon n="check" size={12}/></Btn>
          </div>; })}
        </SeccionCard>
      </div>
    </div>
  );
}

// ═══ CLIENTES ════════════════════════════════════════════════════════════════
function Clientes({ clientes, setClientes, polizas, planes, setTab }) {
  const [buscar,setBuscar]=useState(""); const [modal,setModal]=useState(null); const [form,setForm]=useState({}); const [verDetalle,setVerDetalle]=useState(null); const [estadoCuentaId,setEstadoCuentaId]=useState(null);
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));
  const filtrados=clientes.filter(c=>`${c.nombre} ${c.apellido} ${c.documento} ${c.telPrincipal} ${c.email}`.toLowerCase().includes(buscar.toLowerCase()));
  const abrirNuevo=()=>{ setForm({tipoCliente:"Persona",nombre:"",apellido:"",nacimiento:"",genero:"Masculino",estadoCivil:"Soltero/a",tipoDoc:"Cédula",documento:"",telPrincipal:"",telSecundario:"",email:"",ocupacion:"",empresa:"",direccion:"",ciudad:"",provincia:"Distrito Nacional",notas:""}); setModal("form"); };
  const abrirEditar=(c)=>{ setForm({...c}); setModal("form"); };
  const guardar=()=>{
    if(!form.nombre||!form.apellido) return alert("Nombre y apellido son requeridos.");
    if(form.documento && (modal==="nuevo"||!form.id)){
      const existe=clientes.find(c=>c.id!==form.id&&c.documento&&c.documento.replace(/[^0-9a-zA-Z]/g,"")===form.documento.replace(/[^0-9a-zA-Z]/g,""));
      if(existe) return alert("⚠️ Ya existe un cliente con ese documento:\n"+existe.nombre+" "+existe.apellido);
    }
    const esNuevo = modal==="nuevo"||!form.id;
    if(esNuevo) setClientes(p=>[...p,{...form,id:Date.now()}]);
    else setClientes(p=>p.map(c=>c.id===form.id?form:c));
    setModal(null);
    // Si es cliente nuevo y tiene fecha de nacimiento → abrir Google Calendar automáticamente
    if(esNuevo && form.nacimiento){
      const nombre = (form.nombre||"")+" "+(form.apellido||"");
      const [anio,mes,dia] = form.nacimiento.split("-");
      // Fecha del próximo cumpleaños
      const hoyDate = new Date();
      const cumpleEsteAnio = new Date(hoyDate.getFullYear(), parseInt(mes)-1, parseInt(dia));
      const fechaCal = cumpleEsteAnio < hoyDate
        ? new Date(hoyDate.getFullYear()+1, parseInt(mes)-1, parseInt(dia))
        : cumpleEsteAnio;
      const pad = n=>String(n).padStart(2,"0");
      const fechaStr = fechaCal.getFullYear()+pad(fechaCal.getMonth()+1)+pad(fechaCal.getDate());
      const fechaFin = fechaStr; // Evento de 1 día
      const params = new URLSearchParams({
        action: "TEMPLATE",
        text: "🎂 Cumpleaños de "+nombre,
        dates: fechaStr+"/"+fechaStr,
        details: "Felicitar a "+nombre+" por su cumpleaños.\nRegistrado en GEHCH CRM.",
        recur: "RRULE:FREQ=YEARLY",
      });
      setTimeout(()=>window.open("https://calendar.google.com/calendar/render?"+params.toString(),"_blank"), 500);
    }
  };
  const eliminar=(id)=>{ if(window.confirm("¿Eliminar este cliente?")) setClientes(p=>p.filter(c=>c.id!==id)); };

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:10}}>
        <div><h2 style={{fontSize:22,fontWeight:900,color:"#0a0a1a",margin:0}}>Clientes</h2><p style={{color:"#888",fontSize:12,margin:"2px 0 0"}}>{clientes.length} registrados</p></div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <Btn sec onClick={()=>{
              const conNacimiento = clientes.filter(c=>c.nacimiento);
              if(conNacimiento.length===0) return alert("No hay clientes con fecha de nacimiento registrada.");
              const pad=n=>String(n).padStart(2,"0");
              const uid=()=>Date.now()+Math.random().toString(36).substr(2,9);
              const eventos = conNacimiento.map(c=>{
                const nombre=(c.nombre||"")+" "+(c.apellido||"");
                const [anio,mes,dia]=c.nacimiento.split("-");
                const hoyDate=new Date();
                const cumpleEsteAnio=new Date(hoyDate.getFullYear(),parseInt(mes)-1,parseInt(dia));
                const fechaCal=cumpleEsteAnio<hoyDate?new Date(hoyDate.getFullYear()+1,parseInt(mes)-1,parseInt(dia)):cumpleEsteAnio;
                const fechaStr=fechaCal.getFullYear()+pad(fechaCal.getMonth()+1)+pad(fechaCal.getDate());
                const mañana=new Date(fechaCal); mañana.setDate(mañana.getDate()+1);
                const fechaFin=mañana.getFullYear()+pad(mañana.getMonth()+1)+pad(mañana.getDate());
                return [
                  "BEGIN:VEVENT",
                  "UID:"+uid()+"@gehch.crm",
                  "DTSTART;VALUE=DATE:"+fechaStr,
                  "DTEND;VALUE=DATE:"+fechaFin,
                  "RRULE:FREQ=YEARLY",
                  "SUMMARY:🎂 Cumpleaños de "+nombre,
                  "DESCRIPTION:Felicitar a "+nombre+". Registrado en GEHCH CRM.",
                  "BEGIN:VALARM",
                  "TRIGGER:-PT0S",
                  "ACTION:DISPLAY",
                  "DESCRIPTION:¡Hoy es el cumpleaños de "+nombre+"!",
                  "END:VALARM",
                  "END:VEVENT"
                ].join("\r\n");
              }).join("\r\n");
              const ics=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//GEHCH CRM//ES","CALSCALE:GREGORIAN",eventos,"END:VCALENDAR"].join("\r\n");
              const blob=new Blob([ics],{type:"text/calendar;charset=utf-8"});
              const url=URL.createObjectURL(blob);
              const a=document.createElement("a"); a.href=url; a.download="Cumpleanos_GEHCH.ics"; a.click();
              URL.revokeObjectURL(url);
              alert("✅ Archivo descargado. Ábrelo para importar "+conNacimiento.length+" cumpleaños en Google Calendar de una vez.");
            }} style={{background:"#fdf2f8",color:"#db2777",border:"1px solid #fbcfe8",fontWeight:700}}>🎂 Exportar cumpleaños (.ICS)</Btn>
          <div style={{position:"relative"}}><span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",color:"#bbb",display:"flex"}}><Icon n="search" size={14}/></span><input value={buscar} onChange={e=>setBuscar(e.target.value)} placeholder="Buscar..." style={{padding:"7px 11px 7px 30px",border:"1.5px solid #e5e7eb",borderRadius:8,fontSize:13,width:200,outline:"none"}}/></div>
          <Btn onClick={abrirNuevo}><Icon n="plus" size={14}/> Nuevo Cliente</Btn>
        </div>
      </div>
      <div style={{background:"#fff",borderRadius:14,boxShadow:"0 2px 12px rgba(0,0,0,0.05)",border:"1px solid #f0f0f0",overflowX:"auto"}}>
        <table>
          <thead><tr style={{background:"#f8f9fa"}}>{["Nombre","Documento","Teléfono","Correo","Ciudad","Pólizas","Acciones"].map(h=><th key={h} style={{padding:"10px 14px",textAlign:"left",fontSize:11,fontWeight:700,color:"#999",textTransform:"uppercase",letterSpacing:.5,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
          <tbody>
            {filtrados.map((c,i)=>(
              <tr key={c.id} style={{borderTop:"1px solid #f5f5f5",background:i%2?"#fafafa":"#fff"}}>
                <td style={{padding:"11px 14px"}}><div style={{fontWeight:700,fontSize:14,color:"#0a0a1a",cursor:"pointer"}} onClick={()=>setVerDetalle(c)}>{c.nombre} {c.apellido}{c.tipoCliente==="Empresa"?<span style={{marginLeft:6,background:"#6366f11a",color:"#6366f1",borderRadius:99,fontSize:10,fontWeight:700,padding:"1px 7px"}}>EMPRESA</span>:null}</div><div style={{fontSize:11,color:"#aaa"}}>{c.tipoCliente==="Empresa"?`RNC: ${c.documento}`:`${edadAnios(c.nacimiento)} · ${c.genero||""}`}</div></td>
                <td style={{padding:"11px 14px",fontSize:12,color:"#666"}}><span style={{fontSize:10,color:"#aaa",marginRight:4}}>{c.tipoDoc}</span>{c.documento}</td>
                <td style={{padding:"11px 14px",fontSize:12,color:"#444"}}>{c.telPrincipal||"—"}{c.telSecundario?<div style={{fontSize:11,color:"#aaa"}}>{c.telSecundario}</div>:null}</td>
                <td style={{padding:"11px 14px",fontSize:12,color:"#666"}}>{c.email||"—"}</td>
                <td style={{padding:"11px 14px",fontSize:12,color:"#666"}}>{c.ciudad||"—"}</td>
                <td style={{padding:"11px 14px"}}><span style={{background:"#6366f11a",color:"#6366f1",borderRadius:99,padding:"2px 9px",fontSize:12,fontWeight:700}}>{polizas.filter(p=>p.clienteId===c.id).length}</span></td>
                <td style={{padding:"11px 14px"}}><div style={{display:"flex",gap:5}}>
                  <Btn sm sec onClick={()=>setVerDetalle(c)} title="Ver detalle"><Icon n="search" size={12}/></Btn>
                  <Btn sm sec onClick={()=>setEstadoCuentaId(c.id)} title="Estado de cuenta" style={{background:"#fffbeb",color:"#d97706",border:"1px solid #fde68a"}}>📄</Btn>
                  <Btn sm sec onClick={()=>abrirEditar(c)}><Icon n="edit" size={12}/></Btn>
                  {c.nacimiento&&<Btn sm sec onClick={()=>{
                    const nombre=(c.nombre||"")+" "+(c.apellido||"");
                    const [anio,mes,dia]=c.nacimiento.split("-");
                    const hoyDate=new Date();
                    const cumpleEsteAnio=new Date(hoyDate.getFullYear(),parseInt(mes)-1,parseInt(dia));
                    const fechaCal=cumpleEsteAnio<hoyDate?new Date(hoyDate.getFullYear()+1,parseInt(mes)-1,parseInt(dia)):cumpleEsteAnio;
                    const pad=n=>String(n).padStart(2,"0");
                    const fechaStr=fechaCal.getFullYear()+pad(fechaCal.getMonth()+1)+pad(fechaCal.getDate());
                    const params=new URLSearchParams({action:"TEMPLATE",text:"🎂 Cumpleaños de "+nombre,dates:fechaStr+"/"+fechaStr,details:"Felicitar a "+nombre+".\nRegistrado en GEHCH CRM.",recur:"RRULE:FREQ=YEARLY"});
                    window.open("https://calendar.google.com/calendar/render?"+params.toString(),"_blank");
                  }} style={{background:"#fdf2f8",color:"#db2777",border:"1px solid #fbcfe8"}}>🎂</Btn>}
                  <Btn sm danger onClick={()=>eliminar(c.id)}><Icon n="trash" size={12}/></Btn>
                </div></td>
              </tr>
            ))}
            {filtrados.length===0&&<tr><td colSpan={7} style={{padding:32,textAlign:"center",color:"#ccc",fontSize:14}}>No se encontraron clientes.</td></tr>}
          </tbody>
        </table>
      </div>

      {modal==="form" && (
        <Modal titulo={form.id?"Editar Cliente":"Nuevo Cliente"} onClose={()=>setModal(null)} wide>
          <div style={{display:"flex",gap:10,marginBottom:16}}>
            {["Persona","Empresa"].map(t=>(
              <div key={t} onClick={()=>F("tipoCliente",t)} style={{flex:1,padding:"12px",borderRadius:9,border:`1.5px solid ${(form.tipoCliente||"Persona")===t?"#0a1628":"#e5e7eb"}`,background:(form.tipoCliente||"Persona")===t?"#0a1628":"#fff",color:(form.tipoCliente||"Persona")===t?"#fff":"#555",cursor:"pointer",textAlign:"center",fontWeight:600,fontSize:13,transition:"all .15s"}}>
                {t==="Persona"?"👤 Persona Física":"🏢 Empresa / RNC"}
              </div>
            ))}
          </div>

          {(form.tipoCliente||"Persona")==="Empresa" ? (<>
            <Row>
              <Campo label="Nombre / Razón Social *" half><Inp value={form.nombre||""} onChange={e=>F("nombre",e.target.value)} placeholder="Nombre comercial o razón social"/></Campo>
              <Campo label="Siglas (opcional)" half><Inp value={form.apellido||""} onChange={e=>F("apellido",e.target.value)} placeholder="S.R.L., S.A., C. por A..."/></Campo>
            </Row>
            <Row>
              <Campo label="RNC *" half><Inp value={form.documento||""} onChange={e=>{F("documento",e.target.value);F("tipoDoc","RNC");}} placeholder="1-23-45678-9"/></Campo>
              <Campo label="Sector / Industria" half><Inp value={form.ocupacion||""} onChange={e=>F("ocupacion",e.target.value)} placeholder="Construcción, Comercio, Salud..."/></Campo>
            </Row>
          </>) : (<>
            <div style={{background:"#f8f9fa",borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:12,color:"#666"}}>📋 Complete la información del cliente</div>
            <Row><Campo label="Nombre *" half><Inp value={form.nombre||""} onChange={e=>F("nombre",e.target.value)} placeholder="Nombre"/></Campo><Campo label="Apellido *" half><Inp value={form.apellido||""} onChange={e=>F("apellido",e.target.value)} placeholder="Apellido"/></Campo></Row>
            <Row><Campo label="Fecha de Nacimiento" third><Inp type="date" value={form.nacimiento||""} onChange={e=>F("nacimiento",e.target.value)}/></Campo><Campo label="Género" third><Sel value={form.genero||"Masculino"} onChange={e=>F("genero",e.target.value)}>{GÉNEROS.map(g=><option key={g}>{g}</option>)}</Sel></Campo><Campo label="Estado Civil" third><Sel value={form.estadoCivil||"Soltero/a"} onChange={e=>F("estadoCivil",e.target.value)}>{ESTADOS_CIVILES.map(g=><option key={g}>{g}</option>)}</Sel></Campo></Row>
            <Row><Campo label="Tipo de Documento" half><Sel value={form.tipoDoc||"Cédula"} onChange={e=>F("tipoDoc",e.target.value)}><option>Cédula</option><option>Pasaporte</option></Sel></Campo><Campo label="Número de Documento" half><Inp value={form.documento||""} onChange={e=>F("documento",e.target.value)} placeholder="001-0000000-0"/></Campo></Row>
          </>)}
          <Row><Campo label="Teléfono Principal" half><Inp value={form.telPrincipal||""} onChange={e=>F("telPrincipal",e.target.value)} placeholder="809-000-0000"/></Campo><Campo label="Teléfono Secundario" half><Inp value={form.telSecundario||""} onChange={e=>F("telSecundario",e.target.value)} placeholder="829-000-0000"/></Campo></Row>
          <Campo label="Correo Electrónico"><Inp type="email" value={form.email||""} onChange={e=>F("email",e.target.value)} placeholder="correo@ejemplo.com"/></Campo>
          <Row><Campo label="Ocupación" half><Inp value={form.ocupacion||""} onChange={e=>F("ocupacion",e.target.value)} placeholder="Médico, Ingeniero..."/></Campo><Campo label="Empresa / Lugar de Trabajo" half><Inp value={form.empresa||""} onChange={e=>F("empresa",e.target.value)} placeholder="Nombre de la empresa"/></Campo></Row>
          <Campo label="Dirección"><Inp value={form.direccion||""} onChange={e=>F("direccion",e.target.value)} placeholder="Calle, número, sector..."/></Campo>
          <Row><Campo label="Ciudad" half><Inp value={form.ciudad||""} onChange={e=>F("ciudad",e.target.value)} placeholder="Ciudad"/></Campo><Campo label="Provincia" half><Sel value={form.provincia||"Distrito Nacional"} onChange={e=>F("provincia",e.target.value)}>{PROVINCIAS_DO.map(p=><option key={p}>{p}</option>)}</Sel></Campo></Row>
          <Campo label="Notas internas"><Txta value={form.notas||""} onChange={e=>F("notas",e.target.value)} placeholder="Observaciones, preferencias de contacto..."/></Campo>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}><Btn sec onClick={()=>setModal(null)}>Cancelar</Btn><Btn onClick={guardar}><Icon n="check" size={13}/> Guardar</Btn></div>
        </Modal>
      )}

      {verDetalle && <DetalleCliente cliente={verDetalle} polizas={polizas} onClose={()=>setVerDetalle(null)} onEditar={()=>{abrirEditar(verDetalle);setVerDetalle(null);}}/> }
      {estadoCuentaId && <EstadoCuenta clientes={clientes} polizas={polizas} planes={planes} movimientos={movimientos} clienteId={estadoCuentaId} onClose={()=>setEstadoCuentaId(null)}/>}
    </div>
  );
}

function DetalleCliente({ cliente:c, polizas, onClose, onEditar }) {
  const pols = polizas.filter(p=>p.clienteId===c.id);
  return (
    <Modal titulo={`${c.nombre} ${c.apellido}`} onClose={onClose} wide>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
        <div style={{background:"#f8f9fa",borderRadius:10,padding:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Datos personales</div>
          {[["Documento",`${c.tipoDoc}: ${c.documento}`],["Nacimiento",`${fmt(c.nacimiento)} (${edadAnios(c.nacimiento)})`],["Género",c.genero],["Estado civil",c.estadoCivil],["Ocupación",c.ocupacion||"—"],["Empresa",c.empresa||"—"]].map(([k,v])=>(
            <div key={k} style={{marginBottom:6}}><span style={{fontSize:11,color:"#aaa"}}>{k}: </span><span style={{fontSize:13,color:"#0a0a1a",fontWeight:600}}>{v||"—"}</span></div>
          ))}
        </div>
        <div style={{background:"#f8f9fa",borderRadius:10,padding:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Contacto y ubicación</div>
          {[["Tel. principal",c.telPrincipal],["Tel. secundario",c.telSecundario],["Correo",c.email],["Dirección",c.direccion],["Ciudad",c.ciudad],["Provincia",c.provincia]].map(([k,v])=>(
            <div key={k} style={{marginBottom:6}}><span style={{fontSize:11,color:"#aaa"}}>{k}: </span><span style={{fontSize:13,color:"#0a0a1a",fontWeight:600}}>{v||"—"}</span></div>
          ))}
        </div>
      </div>
      {c.notas&&<div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:10,marginBottom:16,fontSize:13,color:"#92400e"}}>📝 {c.notas}</div>}
      <div style={{marginBottom:8,fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase"}}>Pólizas ({pols.length})</div>
      {pols.map(p=><div key={p.id} style={{background:"#f8f9fa",borderRadius:8,padding:10,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontWeight:600,fontSize:13}}>{p.ramo} · {p.numero}</div><div style={{fontSize:11,color:"#888"}}>{p.aseguradora} · {moneda(p.prima,p.moneda)}</div></div>
        <Badge t={p.estado}/>
      </div>)}
      {pols.length===0&&<div style={{color:"#bbb",fontSize:13,textAlign:"center",padding:12}}>Sin pólizas registradas.</div>}
      <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:16}}><Btn sec onClick={onEditar}><Icon n="edit" size={13}/> Editar</Btn><Btn sec onClick={onClose}>Cerrar</Btn></div>
    </Modal>
  );
}

// ═══ PÓLIZAS ═════════════════════════════════════════════════════════════════
function Polizas({ polizas,setPolizas,clientes,planes,setPlanes,beneficiarios,setBeneficiarios,todasAseguradoras=ASEGURADORAS_RD,setAseguradorasExtra=()=>{},aseguradorasExtra=[],movimientos=[],setMovimientos=()=>{},unidades=[],setUnidades=()=>{} }) {
  const [buscar,setBuscar]=useState(""); const [modal,setModal]=useState(null); const [form,setForm]=useState({}); const [planModal,setPlanModal]=useState(null); const [benModal,setBenModal]=useState(null); const [renovModal,setRenovModal]=useState(null); const [movModal,setMovModal]=useState(null); const [formMov,setFormMov]=useState({}); const FM=(k,v)=>setFormMov(f=>({...f,[k]:v})); const [uniModal,setUniModal]=useState(null);
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));
  const filtradas=polizas.filter(p=>{ const cli=clientes.find(c=>c.id===p.clienteId); return `${cli?.nombre} ${cli?.apellido} ${cli?.documento} ${p.numero} ${p.aseguradora} ${p.ramo}`.toLowerCase().includes(buscar.toLowerCase()); });
  const abrirNuevo=()=>{ setForm({clienteId:"",numero:"",aseguradora:"",ramo:"Salud",inicio:hoy(),fin:"",prima:"",sumaAsegurada:"",moneda:"RD$",estado:"Vigente",frecuencia:"Mensual",comision:"",notas:"",cuotasPersonalizadas:""}); setModal("form"); };
  const guardar=()=>{
    if(!form.clienteId) return alert("Seleccione un cliente.");
    if(!form.numero) return alert("Ingrese el número de póliza.");
    if(!form.prima) return alert("Ingrese la prima.");
    if(form.frecuencia==="Personalizado"&&!form.cuotasPersonalizadas) return alert("Ingrese el número de cuotas.");
    if(!form.id) {
      const existe = polizas.find(p=>p.numero&&p.numero.toLowerCase()===form.numero.toLowerCase()&&p.id!==form.id);
      if(existe) { const cli=clientes.find(c=>c.id===existe.clienteId); return alert("⚠️ Ya existe una póliza con ese número:\n"+existe.numero+" — "+cli?.nombre+" "+cli?.apellido); }
    }
    const datos={...form,clienteId:Number(form.clienteId),prima:Number(form.prima),sumaAsegurada:Number(form.sumaAsegurada||0),comision:Number(form.comision||0),cuotasPersonalizadas:Number(form.cuotasPersonalizadas||0)};
    if(!form.id){
      const newId=Date.now();
      setPolizas(p=>[...p,{...datos,id:newId}]);
      if(datos.frecuencia==="Personalizado"){
        const numCuotas=datos.cuotasPersonalizadas;
        const montoCuota=datos.prima/numCuotas;
        const cuotas=[];
        const [anioI,mesI,diaI]=datos.inicio.split("-").map(Number);
        for(let i=0;i<numCuotas;i++){
          let mesTotal=mesI-1+i;
          let anio=anioI+Math.floor(mesTotal/12);
          let mes=mesTotal%12+1;
          const diasEnMes=new Date(anio,mes,0).getDate();
          const dia=Math.min(diaI,diasEnMes);
          const fecha=anio+"-"+String(mes).padStart(2,"0")+"-"+String(dia).padStart(2,"0");
          cuotas.push({id:Date.now()+i+Math.random()*1000,polizaId:newId,numero:i+1,total:numCuotas,fecha,monto:montoCuota,estado:"Pendiente",fechaPago:null,notaPago:""});
        }
        setPlanes(p=>[...p,...cuotas]);
      } else {
        setPlanes(p=>[...p,...generarCuotas(newId,datos.inicio,datos.frecuencia,datos.prima)]);
      }
    } else {
      setPolizas(p=>p.map(x=>x.id===form.id?{...datos,id:form.id}:x));
      // Regenerar cuotas solo si cambió la prima o la frecuencia
      const polAnterior = polizas.find(x=>x.id===form.id);
      const primaDistinta = polAnterior && Number(polAnterior.prima) !== Number(datos.prima);
      const frecDistinta = polAnterior && polAnterior.frecuencia !== datos.frecuencia;
      const cuotasDistintas = polAnterior && Number(polAnterior.cuotasPersonalizadas||0) !== Number(datos.cuotasPersonalizadas||0);
      if(primaDistinta || frecDistinta || cuotasDistintas){
        const confirmar = window.confirm(
          "¿Desea regenerar las cuotas con la nueva prima y frecuencia?\n\n" +
          "⚠️ Esto eliminará las cuotas pendientes actuales.\n" +
          "Las cuotas ya pagadas no se eliminarán."
        );
        if(confirmar){
          // Eliminar solo cuotas pendientes/vencidas de esta póliza
          setPlanes(prev=>{
            const pagadas = prev.filter(c=>c.polizaId===form.id && c.estado==="Pagado");
            let nuevasCuotas = [];
            if(datos.frecuencia==="Personalizado"){
              const numCuotas=datos.cuotasPersonalizadas;
              const montoCuota=datos.prima/numCuotas;
              const [anioI,mesI,diaI]=datos.inicio.split("-").map(Number);
              for(let i=0;i<numCuotas;i++){
                let mesTotal=mesI-1+i;
                let anio=anioI+Math.floor(mesTotal/12);
                let mes=mesTotal%12+1;
                const diasEnMes=new Date(anio,mes,0).getDate();
                const dia=Math.min(diaI,diasEnMes);
                const fecha=anio+"-"+String(mes).padStart(2,"0")+"-"+String(dia).padStart(2,"0");
                nuevasCuotas.push({id:Date.now()+i+Math.random()*1000,polizaId:form.id,numero:pagadas.length+i+1,total:numCuotas,fecha,monto:montoCuota,estado:"Pendiente",fechaPago:null,notaPago:""});
              }
            } else {
              nuevasCuotas = generarCuotas(form.id, datos.inicio, datos.frecuencia, datos.prima);
            }
            return [...prev.filter(c=>c.polizaId!==form.id||c.estado==="Pagado"), ...nuevasCuotas];
          });
        }
      }
    }
    setModal(null);
    // Al crear poliza nueva preguntar si desea registrar unidades
    if(!form.id){
      const polNueva={...datos,id:newId};
      setTimeout(()=>{
        if(window.confirm("Poliza "+datos.numero+" creada correctamente.\n\n¿Desea registrar las unidades aseguradas ahora?")){
          setUniModal(polNueva);
        }
      },300);
    }
  };
  const eliminar=(id)=>{ if(window.confirm("¿Eliminar póliza y sus cuotas?")){ setPolizas(p=>p.filter(x=>x.id!==id)); setPlanes(p=>p.filter(x=>x.polizaId!==id)); setBeneficiarios(p=>p.filter(x=>x.polizaId!==id)); } };
  const comisionTotal = polizas.reduce((a,p)=>a+(p.prima*(p.comision||0)/100),0);

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:10}}>
        <div><h2 style={{fontSize:22,fontWeight:900,color:"#0a0a1a",margin:0}}>Pólizas</h2><p style={{color:"#888",fontSize:12,margin:"2px 0 0"}}>{polizas.length} registradas · Comisiones est.: {moneda(comisionTotal,"RD$")}</p></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{position:"relative"}}><span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",color:"#bbb",display:"flex"}}><Icon n="search" size={14}/></span><input value={buscar} onChange={e=>setBuscar(e.target.value)} placeholder="Buscar..." style={{padding:"7px 11px 7px 30px",border:"1.5px solid #e5e7eb",borderRadius:8,fontSize:13,width:200,outline:"none"}}/></div>
          <Btn onClick={abrirNuevo}><Icon n="plus" size={14}/> Nueva Póliza</Btn>
        </div>
      </div>
      <div style={{background:"#fff",borderRadius:14,boxShadow:"0 2px 12px rgba(0,0,0,0.05)",border:"1px solid #f0f0f0",overflowX:"auto"}}>
        <table>
          <thead><tr style={{background:"#f8f9fa"}}>{["Cliente","N° Póliza","Aseguradora","Ramo","Prima","Suma Aseg.","Vigencia","Frec.","Comisión","Estado","Acciones"].map(h=><th key={h} style={{padding:"10px 12px",textAlign:"left",fontSize:11,fontWeight:700,color:"#999",textTransform:"uppercase",letterSpacing:.5,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
          <tbody>
            {filtradas.map((p,i)=>{ const cli=clientes.find(c=>c.id===p.clienteId); const d=diasHasta(p.fin); return (
              <tr key={p.id} style={{borderTop:"1px solid #f5f5f5",background:i%2?"#fafafa":"#fff"}}>
                <td style={{padding:"10px 12px",fontWeight:700,color:"#0a0a1a",fontSize:13}}>{cli?.nombre} {cli?.apellido}</td>
                <td style={{padding:"10px 12px",fontSize:11,color:"#666",fontFamily:"monospace"}}>{p.numero}</td>
                <td style={{padding:"10px 12px",fontSize:12,color:"#666"}}>{p.aseguradora}</td>
                <td style={{padding:"10px 12px",fontSize:12}}>{p.ramo}</td>
                <td style={{padding:"10px 12px",fontSize:12,fontWeight:700}}>{moneda(p.prima,p.moneda)}</td>
                <td style={{padding:"10px 12px",fontSize:11,color:"#666"}}>{p.sumaAsegurada?moneda(p.sumaAsegurada,p.moneda):"—"}</td>
                <td style={{padding:"10px 12px",fontSize:11,color:d<0?"#dc2626":d<30?"#d97706":"#666",whiteSpace:"nowrap"}}>{fmt(p.inicio)} → {fmt(p.fin)}{d>=0&&d<=30?` (${d}d)`:""}</td>
                <td style={{padding:"10px 12px",fontSize:11,color:"#666"}}>{p.frecuencia||"—"}</td>
                <td style={{padding:"10px 12px",fontSize:12,color:"#16a34a",fontWeight:600}}>{p.comision?<span><span style={{fontSize:10,color:"#888"}}>{p.comision}% = </span>{moneda(p.prima*p.comision/100,p.moneda)}</span>:"—"}</td>
                <td style={{padding:"10px 12px"}}><Badge t={p.estado}/></td>
                <td style={{padding:"10px 12px"}}><div style={{display:"flex",gap:4}}>
                  <Btn sm sec onClick={()=>setPlanModal(p)} title="Ver cuotas"><Icon n="pago" size={12}/></Btn>
                  {(p.ramo==="Vida"||p.ramo==="Salud")&&<Btn sm sec onClick={()=>setBenModal(p)} title="Beneficiarios"><Icon n="family" size={12}/></Btn>}
                  {(p.estado==="Vigente"||p.estado==="Por Renovar")&&<button onClick={()=>{
  const cuotasPendientes=planes.filter(c=>c.polizaId===p.id&&(c.estado==="Pendiente"||c.estado==="Vencido"));
  if(cuotasPendientes.length>0){
    alert(`⚠️ No puede renovar esta póliza.\n\nTiene ${cuotasPendientes.length} cuota${cuotasPendientes.length!==1?"s":""} pendiente${cuotasPendientes.length!==1?"s":""} de pago.\n\nRegularice los pagos antes de renovar.`);
    return;
  }
  setRenovModal(p);
}} style={{padding:"5px 10px",borderRadius:7,border:"1px solid #fde68a",background:"#fffbeb",color:"#d97706",cursor:"pointer",fontSize:11,fontWeight:700}}>🔄 Renovar</button>}
                  {(p.estado==="Vigente"||p.estado==="Por Renovar")&&<button onClick={()=>{ const cli=clientes.find(c=>c.id===p.clienteId); abrirGoogleCalendar(`🔄 Renovación - ${p.aseguradora} - ${cli?.nombre} ${cli?.apellido}`,p.fin,`Cliente: ${cli?.nombre} ${cli?.apellido}\nPóliza: ${p.numero}\nRamo: ${p.ramo}\nPrima: ${moneda(p.prima,p.moneda)}\nAseguradora: ${p.aseguradora}\n\n⚠️ Esta póliza vence hoy. Gestionar renovación.`); }} style={{padding:"5px 10px",borderRadius:7,border:"1px solid #4285f4",background:"#fff",color:"#4285f4",cursor:"pointer",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",gap:4}}><span>📅</span> Google Cal</button>}
                  <Btn sm sec onClick={()=>setUniModal(p)} style={{background:"#f0f9ff",color:"#0369a1",border:"1px solid #bae6fd"}} title="Unidades aseguradas">📋</Btn>
                  <Btn sm sec onClick={()=>{setMovModal(p);setFormMov({tipo:"credito",monto:"",descripcion:"",fecha:hoy()});}} style={{background:"#fdf4ff",color:"#7e22ce",border:"1px solid #e9d5ff"}} title="Movimiento">📊</Btn>
                  <Btn sm sec onClick={()=>{setForm({...p});setModal("form");}}><Icon n="edit" size={12}/></Btn>
                  <Btn sm danger onClick={()=>eliminar(p.id)}><Icon n="trash" size={12}/></Btn>
                </div></td>
              </tr>
            ); })}
            {filtradas.length===0&&<tr><td colSpan={11} style={{padding:32,textAlign:"center",color:"#ccc",fontSize:14}}>No se encontraron pólizas.</td></tr>}
          </tbody>
        </table>
      </div>

      {modal==="form" && (
        <Modal titulo={form.id?"Editar Póliza":"Nueva Póliza"} onClose={()=>setModal(null)} wide>
          <Campo label="Cliente *"><Sel value={form.clienteId||""} onChange={e=>F("clienteId",e.target.value)}><option value="">-- Seleccionar cliente --</option>{clientes.map(c=><option key={c.id} value={c.id}>{c.nombre} {c.apellido} · {c.documento}</option>)}</Sel></Campo>
          <Row><Campo label="N° de Póliza *" half><Inp value={form.numero||""} onChange={e=>F("numero",e.target.value)} placeholder="SC-001-2025"/></Campo><Campo label="Aseguradora" half>
              <Sel value={todasAseguradoras.includes(form.aseguradora||"")?form.aseguradora||"":"__otra__"} onChange={e=>{ if(e.target.value!=="__otra__") F("aseguradora",e.target.value); else F("aseguradora","__nueva__"); }}>
                <option value="">-- Seleccionar --</option>
                {todasAseguradoras.map(a=><option key={a}>{a}</option>)}
                <option value="__otra__">+ Nueva aseguradora</option>
              </Sel>
              {(form.aseguradora==="__nueva__"||(!todasAseguradoras.includes(form.aseguradora||"")&&form.aseguradora!==""))&&<div style={{marginTop:6}}>
                <Inp value={form.aseguradora==="__nueva__"?"":form.aseguradora||""} onChange={e=>F("aseguradora",e.target.value)} placeholder="Escriba el nombre exacto de la aseguradora..."/>
                {form.aseguradora&&form.aseguradora!=="__nueva__"&&form.aseguradora.length>3&&(()=>{
                  const similar = todasAseguradoras.find(a=>{ const s=form.aseguradora.toLowerCase().replace(/[^a-z0-9]/g,""); const t=a.toLowerCase().replace(/[^a-z0-9]/g,""); return s===t||s.includes(t)||t.includes(s)||(s.length>5&&t.length>5&&(s.slice(0,-1)===t||t.slice(0,-1)===s)); });
                  if(similar) return <div style={{marginTop:4,padding:"6px 10px",background:"#fff5f5",border:"1px solid #fecaca",borderRadius:7,fontSize:12,color:"#dc2626",fontWeight:600}}>⚠️ Ya existe una aseguradora similar: <strong>"{similar}"</strong>. ¿Es la misma?</div>;
                  return <div style={{marginTop:4,padding:"6px 10px",background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:7,fontSize:12,color:"#16a34a",fontWeight:600,cursor:"pointer"}} onClick={()=>{ if(form.aseguradora&&form.aseguradora!=="__nueva__"){ setAseguradorasExtra(p=>[...p.filter(x=>x!==form.aseguradora),form.aseguradora]); } }}>✅ Clic para guardar "{form.aseguradora}" en la lista permanente</div>;
                })()}
              </div>}
            </Campo></Row>
          <Row><Campo label="Ramo" third><Sel value={form.ramo||"Salud"} onChange={e=>F("ramo",e.target.value)}>{RAMOS.map(r=><option key={r}>{r}</option>)}</Sel></Campo><Campo label="Estado" third><Sel value={form.estado||"Vigente"} onChange={e=>F("estado",e.target.value)}>{ESTADOS_POL.map(e=><option key={e}>{e}</option>)}</Sel></Campo><Campo label="Frecuencia de Pago" third><Sel value={form.frecuencia||"Mensual"} onChange={e=>F("frecuencia",e.target.value)}>{FRECUENCIAS.map(f=><option key={f}>{f}</option>)}<option value="Personalizado">Personalizado</option></Sel></Campo></Row>
          <Row><Campo label="Prima Total Anual *" third><Inp type="number" value={form.prima||""} onChange={e=>F("prima",e.target.value)} placeholder="0.00"/></Campo><Campo label="Suma Asegurada" third><Inp type="number" value={form.sumaAsegurada||""} onChange={e=>F("sumaAsegurada",e.target.value)} placeholder="0.00"/></Campo><Campo label="Moneda" third><Sel value={form.moneda||"RD$"} onChange={e=>F("moneda",e.target.value)}><option value="RD$">Pesos (RD$)</option><option value="USD">Dólares (USD)</option></Sel></Campo></Row>
          <Row><Campo label="Fecha de Inicio" third><Inp type="date" value={form.inicio||""} onChange={e=>{ F("inicio",e.target.value); if(e.target.value){ const d=new Date(e.target.value+"T00:00:00"); d.setFullYear(d.getFullYear()+1); const fechaFin=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); F("fin",fechaFin); } }}/></Campo><Campo label="Fecha de Fin" third><Inp type="date" value={form.fin||""} onChange={e=>F("fin",e.target.value)}/></Campo><Campo label="Comisión (%)" third><Inp type="number" value={form.comision||""} onChange={e=>F("comision",e.target.value)} placeholder="5"/></Campo></Row>
          {form.prima&&form.frecuencia&&!form.id&&form.frecuencia!=="Personalizado"&&<div style={{marginBottom:13,padding:"8px 12px",background:"#f0f9ff",borderRadius:8,fontSize:12,color:"#0369a1"}}>💡 Se generarán <strong>{12/FREC_MESES[form.frecuencia]}</strong> cuotas de <strong>{moneda(Number(form.prima)/(12/FREC_MESES[form.frecuencia]),form.moneda||"RD$")}</strong> cada una</div>}
          {form.frecuencia==="Personalizado"&&<div style={{marginBottom:13}}>
            <label style={{fontSize:11,fontWeight:700,color:"#666",textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:4}}>Número de cuotas mensuales *</label>
            <input type="number" min="1" max="24" value={form.cuotasPersonalizadas||""} onChange={e=>F("cuotasPersonalizadas",e.target.value)} placeholder="Ej: 5, 6, 7..." style={{width:"100%",padding:"8px 11px",border:"1.5px solid #e5e7eb",borderRadius:8,fontSize:13,outline:"none",boxSizing:"border-box"}}/>
            {form.prima&&form.cuotasPersonalizadas&&<div style={{marginTop:6,padding:"8px 12px",background:"#f0fdf4",borderRadius:8,fontSize:12,color:"#166534"}}>💡 Se generarán <strong>{form.cuotasPersonalizadas}</strong> cuotas mensuales de <strong>{moneda(Number(form.prima)/Number(form.cuotasPersonalizadas),form.moneda||"RD$")}</strong> cada una</div>}
          </div>}
          {form.comision&&form.prima&&<div style={{marginBottom:13,padding:"8px 12px",background:"#f0fdf4",borderRadius:8,fontSize:12,color:"#166534"}}>💰 Comisión estimada: <strong>{moneda(Number(form.prima)*Number(form.comision)/100,form.moneda||"RD$")}</strong></div>}
          <Campo label="Notas internas"><Txta value={form.notas||""} onChange={e=>F("notas",e.target.value)} placeholder="Observaciones sobre la póliza..."/></Campo>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}><Btn sec onClick={()=>setModal(null)}>Cancelar</Btn><Btn onClick={guardar}><Icon n="check" size={13}/> {form.id?"Guardar":"Guardar y generar cuotas"}</Btn></div>
        </Modal>
      )}
      {planModal&&<ModalCuotas pol={planModal} planes={planes} setPlanes={setPlanes} clientes={clientes} polizas={polizas} onClose={()=>setPlanModal(null)}/>}
      {benModal&&<ModalBeneficiarios pol={benModal} beneficiarios={beneficiarios} setBeneficiarios={setBeneficiarios} onClose={()=>setBenModal(null)}/>}
      {renovModal&&<ModalRenovacion pol={renovModal} clientes={clientes} setPolizas={setPolizas} setPlanes={setPlanes} onClose={()=>setRenovModal(null)}/>}
      {uniModal&&<ModalUnidades pol={uniModal} unidades={unidades} setUnidades={setUnidades} onClose={()=>setUniModal(null)}/>}
      {movModal&&(()=>{
        const pM=movModal;
        const cP=planes.filter(c=>c.polizaId===pM.id&&(c.estado==="Pendiente"||c.estado==="Vencido")).sort((a,b)=>a.numero-b.numero);
        const guardarMov=()=>{
          const monto=Number(formMov.monto);
          if(!monto||monto<=0){alert("Ingrese un monto valido.");return;}
          if(!formMov.descripcion){alert("Ingrese una descripcion.");return;}
          const esC=formMov.tipo==="credito";
          // 1. Registrar movimiento
          setMovimientos(prev=>[...prev,{id:Date.now(),polizaId:pM.id,tipo:formMov.tipo,monto,descripcion:formMov.descripcion,fecha:formMov.fecha||hoy(),registrado:hoy()}]);
          // 2. Actualizar prima de la poliza — sube con aumento, baja con credito
          const nuevaPrima=Number(Math.max(0,esC?pM.prima-monto:pM.prima+monto).toFixed(2));
          setPolizas(prev=>prev.map(p=>p.id===pM.id?{...p,prima:nuevaPrima}:p));
          // 3. Distribuir entre cuotas pendientes
          if(cP.length>0){
            const aj=monto/cP.length;
            setPlanes(prev=>prev.map(c=>{
              if(!cP.find(x=>x.id===c.id)) return c;
              return {...c,monto:Number(Math.max(0,esC?c.monto-aj:c.monto+aj).toFixed(2))};
            }));
          }
          setMovModal(null);
          alert("Movimiento registrado. Prima actualizada a "+moneda(nuevaPrima,pM.moneda)+(cP.length>0?". Distribuido en "+cP.length+" cuota(s).":"."));
        };
        return(
          <Modal titulo={"Registrar Movimiento - "+pM.numero} onClose={()=>setMovModal(null)}>
            <div style={{marginBottom:14,padding:"10px 14px",background:"#f8f9fa",borderRadius:8,fontSize:12}}>
              <strong>{pM.aseguradora}</strong> &middot; {pM.ramo} &middot; Prima: <strong>{moneda(pM.prima,pM.moneda)}</strong>
              {cP.length>0&&<span style={{color:"#d97706"}}> &middot; {cP.length} cuota(s) pendiente(s)</span>}
              {cP.length===0&&<span style={{color:"#dc2626"}}> &middot; Sin cuotas pendientes</span>}
            </div>
            <Row><Campo label="Tipo de movimiento"><Sel value={formMov.tipo||"credito"} onChange={e=>FM("tipo",e.target.value)}>
              <option value="credito">📉 Nota de Credito - Exclusion / Disminucion</option>
              <option value="debito">📈 Endoso de Aumento - Inclusion / Aumento</option>
            </Sel></Campo></Row>
            <Row>
              <Campo label="Monto segun aseguradora" half><Inp type="number" value={formMov.monto||""} onChange={e=>FM("monto",e.target.value)} placeholder="0.00"/></Campo>
              <Campo label="Fecha" half><Inp type="date" value={formMov.fecha||hoy()} onChange={e=>FM("fecha",e.target.value)}/></Campo>
            </Row>
            <Row><Campo label="Descripcion / Referencia"><Inp value={formMov.descripcion||""} onChange={e=>FM("descripcion",e.target.value)} placeholder="Ej: Exclusion Toyota Hilux - Nota Credito #1151061"/></Campo></Row>
            {formMov.monto&&Number(formMov.monto)>0&&cP.length>0&&<div style={{padding:"10px 14px",background:formMov.tipo==="credito"?"#f0fdf4":"#fff7ed",borderRadius:8,fontSize:12,color:formMov.tipo==="credito"?"#166534":"#9a3412",marginBottom:8}}>
              Se {formMov.tipo==="credito"?"restaran":"sumaran"} <strong>{moneda(Number(formMov.monto)/cP.length,pM.moneda)}</strong> por cuota en {cP.length} cuota(s) pendiente(s)
            </div>}
            <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>
              <Btn sec onClick={()=>setMovModal(null)}>Cancelar</Btn>
              <Btn onClick={guardarMov} style={{background:formMov.tipo==="credito"?"#166534":"#7e22ce"}}><Icon n="check" size={13}/> Registrar</Btn>
            </div>
          </Modal>
        );
      })()}
    </div>
  );
}

function ModalCuotas({ pol, planes, setPlanes, clientes, polizas, onClose }) {
  const [pagoModal,setPagoModal]=useState(null); const [formPago,setFormPago]=useState({});
  const cli=clientes.find(c=>c.id===pol.clienteId);
  const cuotas=planes.filter(p=>p.polizaId===pol.id).sort((a,b)=>a.numero-b.numero);
  const pagadas=cuotas.filter(c=>c.estado==="Pagado").length;
  const registrar=()=>{
    const montoPagado = formPago.montoPagado!==undefined&&formPago.montoPagado!==""?Number(formPago.montoPagado):pagoModal.monto;
    const diferencia = montoPagado - pagoModal.monto;
    // Obtener cuotas pendientes de la misma poliza (excluyendo la actual)
    const todasCuotasPoliza = planes.filter(x=>x.polizaId===pagoModal.polizaId).sort((a,b)=>a.numero-b.numero);
    const cuotasPagadas = todasCuotasPoliza.filter(x=>x.id!==pagoModal.id && x.estado==="Pagado");
    const cuotasPendientes = todasCuotasPoliza.filter(x=>x.id!==pagoModal.id && (x.estado==="Pendiente"||x.estado==="Vencido")).sort((a,b)=>a.numero-b.numero);
    // Calcular saldo desde prima total - lo ya pagado - este pago
    const polizaActual = polizas.find(p=>p.id===pagoModal.polizaId);
    const primaTotal = polizaActual?.prima || todasCuotasPoliza.reduce((a,c)=>a+c.monto,0);
    const totalYaPagado = cuotasPagadas.reduce((a,c)=>a+(c.montoPagado||c.monto),0);
    const saldoRestante = primaTotal - totalYaPagado - montoPagado;
    setPlanes(p=>p.map(x=>{
      if(x.id===pagoModal.id) return {...x, estado:"Pagado", fechaPago:formPago.fechaPago||hoy(), notaPago:formPago.notaPago||"", montoPagado};
      // Recalcular cuotas pendientes/vencidas desde saldo real
      if(cuotasPendientes.find(c=>c.id===x.id)){
        const nuevaMonto = cuotasPendientes.length > 0 ? saldoRestante / cuotasPendientes.length : 0;
        return {...x, monto: Math.max(0, nuevaMonto)};
      }
      return x;
    }));
    setPagoModal(null);
  };
  return (
    <Modal titulo={`Cuotas — ${pol.numero}`} onClose={onClose} wide>
      <div style={{marginBottom:14,padding:"10px 14px",background:"#f8f9fa",borderRadius:10,fontSize:12,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <span><strong>{cli?.nombre} {cli?.apellido}</strong> · {pol.aseguradora} · {pol.ramo} · {pol.frecuencia}</span>
        <span>Prima: <strong>{moneda(pol.prima,pol.moneda)}</strong> · Pagadas: <strong style={{color:"#16a34a"}}>{pagadas}/{cuotas.length}</strong></span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {cuotas.map(cu=>{ const d=diasHasta(cu.fecha); const vencida=d<0&&cu.estado==="Pendiente"; const proxima=d>=0&&d<=7&&cu.estado==="Pendiente"; const bg=cu.estado==="Pagado"?"#f0fdf4":vencida?"#fff5f5":proxima?"#fffbeb":"#fff"; const border=cu.estado==="Pagado"?"#bbf7d0":vencida?"#fecaca":proxima?"#fde68a":"#e5e7eb";
          return <div key={cu.id} style={{background:bg,border:`1.5px solid ${border}`,borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <div style={{width:28,height:28,borderRadius:7,background:cu.estado==="Pagado"?"#16a34a1a":vencida?"#dc26261a":"#0ea5e91a",color:cu.estado==="Pagado"?"#16a34a":vencida?"#dc2626":"#0ea5e9",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,flexShrink:0}}>{cu.numero}</div>
            <div style={{flex:1,minWidth:120}}><div style={{fontWeight:600,fontSize:13}}>{moneda(cu.estado==="Pagado"?(cu.montoPagado||cu.monto):cu.monto,pol.moneda)}</div><div style={{fontSize:11,color:"#888"}}>Vence: {fmt(cu.fecha)}{vencida?` · Hace ${Math.abs(d)}d`:proxima?` · En ${d}d`:""}</div>{cu.estado==="Pagado"&&<div style={{fontSize:11,color:"#16a34a"}}>✅ Pagado {fmt(cu.fechaPago)}{cu.notaPago?` · ${cu.notaPago}`:""}</div>}</div>
            <Badge t={vencida?"Vencido":cu.estado}/>
            {cu.estado==="Pendiente"&&<Btn sm onClick={()=>{setPagoModal(cu);setFormPago({fechaPago:hoy(),notaPago:"",montoPagado:String(cu.monto)});}}><Icon n="check" size={12}/> Registrar Pago</Btn>}
            {cu.estado==="Pendiente"&&<Btn sm sec onClick={()=>{ const nf=window.prompt("Fecha correcta (YYYY-MM-DD):",cu.fecha); if(nf&&/^\d{4}-\d{2}-\d{2}$/.test(nf)){ setPlanes(p=>p.map(x=>x.id===cu.id?{...x,fecha:nf}:x)); } else if(nf){ alert("Use formato YYYY-MM-DD. Ejemplo: 2025-12-01"); } }}><Icon n="edit" size={12}/> Editar Fecha</Btn>}
            {cu.estado==="Pendiente"&&<Btn sm sec onClick={()=>{
              const nm=window.prompt("Nuevo monto para esta cuota (el saldo restante se redistribuye entre las otras cuotas pendientes):", String(cu.monto.toFixed(2)));
              if(nm===null) return;
              const nuevoMonto=Number(nm);
              if(isNaN(nuevoMonto)||nuevoMonto<=0){ alert("Ingrese un monto válido mayor a 0."); return; }
              const polizaActual=polizas.find(p=>p.id===cu.polizaId);
              const primaTotal=polizaActual?.prima||0;
              const todasCuotas=planes.filter(x=>x.polizaId===cu.polizaId).sort((a,b)=>a.numero-b.numero);
              const pagadas=todasCuotas.filter(x=>x.id!==cu.id&&x.estado==="Pagado");
              const pendientes=todasCuotas.filter(x=>x.id!==cu.id&&(x.estado==="Pendiente"||x.estado==="Vencido")).sort((a,b)=>a.numero-b.numero);
              const totalPagado=pagadas.reduce((a,x)=>a+(x.montoPagado||x.monto),0);
              const saldoRestante=primaTotal-totalPagado-nuevoMonto;
              if(saldoRestante<0){ if(!window.confirm("El monto supera el saldo pendiente. ¿Continuar de todas formas?")) return; }
              const nuevaMontoPendientes=pendientes.length>0?Math.max(0,saldoRestante/pendientes.length):0;
              setPlanes(p=>p.map(x=>{
                if(x.id===cu.id) return {...x,monto:nuevoMonto};
                if(pendientes.find(c=>c.id===x.id)) return {...x,monto:Number(nuevaMontoPendientes.toFixed(2))};
                return x;
              }));
            }} style={{background:"#fffbeb",color:"#d97706",border:"1px solid #fde68a"}}><Icon n="edit" size={12}/> Editar Monto</Btn>}
            {cu.estado==="Pagado"&&<Btn sm danger onClick={()=>{ const pin=window.prompt("PIN de administrador para anular:"); if(pin==="Klodomiro1234"){ if(window.confirm("¿Anular pago de "+moneda(cu.monto,pol.moneda)+" de "+cli?.nombre+" "+cli?.apellido+"?")){ setPlanes(p=>p.map(x=>x.id===cu.id?{...x,estado:"Pendiente",fechaPago:null,notaPago:"",montoPagado:null}:x)); } } else if(pin!==null){ alert("PIN incorrecto."); } }}>↩️ Anular</Btn>}
            {cu.estado==="Pendiente"&&<button onClick={()=>abrirGoogleCalendar(`💰 Pago Cuota ${cu.numero}/${cu.total} - ${pol.aseguradora}`,cu.fecha,`Cliente: ${cli?.nombre} ${cli?.apellido}\nPóliza: ${pol.numero}\nRamo: ${pol.ramo}\nMonto: ${moneda(cu.monto,pol.moneda)}\nAseguradora: ${pol.aseguradora}`)} style={{padding:"5px 10px",borderRadius:7,border:"1px solid #4285f4",background:"#fff",color:"#4285f4",cursor:"pointer",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",gap:4}}><span>📅</span> Google Cal</button>}
          </div>;
        })}
        {cuotas.length===0&&<p style={{color:"#bbb",textAlign:"center",padding:20}}>No hay cuotas generadas.</p>}
      </div>
      {pagoModal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:1100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:400,boxShadow:"0 20px 60px rgba(0,0,0,0.25)",padding:24}}>
          <h3 style={{margin:"0 0 14px",fontSize:15,fontWeight:800}}>Registrar Pago — Cuota {pagoModal.numero}</h3>
          <div style={{padding:"9px 12px",background:"#f0f9ff",borderRadius:8,marginBottom:14,fontSize:12,color:"#0369a1"}}>Monto: <strong>{moneda(pagoModal.monto,pol.moneda)}</strong> · Venció: <strong>{fmt(pagoModal.fecha)}</strong></div>
          <Campo label="Monto Pagado">
            <Inp type="number" value={formPago.montoPagado!==undefined&&formPago.montoPagado!==null?formPago.montoPagado:pagoModal.monto} onChange={e=>setFormPago(f=>({...f,montoPagado:e.target.value}))}/>
            {Number(formPago.montoPagado||pagoModal.monto) !== pagoModal.monto && Number(formPago.montoPagado||pagoModal.monto) > 0 && (
