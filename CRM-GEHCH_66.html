          <div style={{background:"#fff",borderRadius:14,padding:18,border:"1px solid #f0f0f0"}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>📊 Pólizas por Ramo</div>
            {(()=>{
              const ramos = [...new Set(vigentes.map(p=>p.ramo))];
              const data = ramos.map(ramo=>({ ramo, n:vigentes.filter(p=>p.ramo===ramo).length })).sort((a,b)=>b.n-a.n);
              const maxN = data[0]?.n||1;
              return data.map(d=>{ const pct=Math.round(d.n/vigentes.length*100)||0; const barPct=Math.round(d.n/maxN*100)||0;
                return <div key={d.ramo} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                    <span style={{color:"#555"}}>{d.ramo}</span>
                    <span style={{fontWeight:700,color:"#16a34a"}}>{d.n} ({pct}%)</span>
                  </div>
                  <div style={{height:6,background:"#f0f0f0",borderRadius:3}}><div style={{height:6,background:"#16a34a",borderRadius:3,width:`${barPct}%`}}/></div>
                </div>;
              });
            })()}
            {vigentes.length===0&&<p style={{color:"#bbb",fontSize:13}}>Sin datos.</p>}
          </div>
          <div style={{background:"#fff",borderRadius:14,padding:18,border:"1px solid #f0f0f0"}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>💰 Prima por Ramo</div>
            {(()=>{
              const ramos = [...new Set(vigentes.map(p=>p.ramo))];
              const data = ramos.map(ramo=>{
                const pols = vigentes.filter(p=>p.ramo===ramo);
                const primaRD = pols.filter(p=>p.moneda==="RD$").reduce((a,p)=>a+(+p.prima||0),0);
                const primaUSD = pols.filter(p=>p.moneda==="USD").reduce((a,p)=>a+(+p.prima||0),0);
                const primaTotal = primaRD + (primaUSD*58);
                return { ramo, primaRD, primaUSD, primaTotal };
              }).sort((a,b)=>b.primaTotal-a.primaTotal);
              const maxPrima = data[0]?.primaTotal||1;
              return data.map(d=>{ const barPct=Math.round(d.primaTotal/maxPrima*100)||0;
                return <div key={d.ramo} style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:2}}>
                    <span style={{color:"#555",fontWeight:600}}>{d.ramo}</span>
                  </div>
                  {d.primaRD>0&&<div style={{fontSize:11,color:"#555",marginBottom:1}}>RD$ {d.primaRD.toLocaleString("es-DO",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>}
                  {d.primaUSD>0&&<div style={{fontSize:11,color:"#0ea5e9",marginBottom:1}}>US$ {d.primaUSD.toLocaleString("es-DO",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>}
                  <div style={{height:6,background:"#f0f0f0",borderRadius:3,marginTop:4}}><div style={{height:6,background:"#6366f1",borderRadius:3,width:`${barPct}%`}}/></div>
                </div>;
              });
            })()}
            {vigentes.length===0&&<p style={{color:"#bbb",fontSize:13}}>Sin datos.</p>}
          </div>
        </div>
      </div>}

      {/* ── CARTERA POR ASEGURADORA ── */}
      {subPag==="cartera"&&<div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <label style={{fontSize:13,fontWeight:600,color:"#555"}}>Año:</label>
            <select value={anioFiltro} onChange={e=>setAnioFiltro(e.target.value)} style={{padding:"7px 12px",border:"1.5px solid #e5e7eb",borderRadius:8,fontSize:13,color:"#0a0a1a",background:"#fff",outline:"none"}}>
              <option value="todos">Todos los años</option>
              {anios.map(a=><option key={a} value={a}>{a}</option>)}
            </select>
          </div>
          <button onClick={imprimirCartera} style={{display:"flex",alignItems:"center",gap:7,padding:"8px 16px",borderRadius:8,background:"#0a1628",color:"#fff",border:"none",cursor:"pointer",fontSize:13,fontWeight:600}}>
            🖨️ Imprimir / Exportar
          </button>
        </div>

        {/* Tarjetas resumen */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10,marginBottom:18}}>
          {[
            {label:"Aseguradoras",val:cartPorAseg.length,color:"#6366f1"},
            {label:"Total pólizas",val:totalGenPols,color:"#0a1628"},
            {label:"Primas RD$",val:moneda(totalGenRD,"RD$"),color:"#16a34a"},
            {label:"Primas USD",val:moneda(totalGenUSD,"USD"),color:"#0ea5e9"},
            {label:"Comisión est. RD$",val:moneda(totalGenComRD,"RD$"),color:"#8b5cf6"},
            {label:"Comisión est. USD",val:moneda(totalGenComUSD,"USD"),color:"#6366f1"},
          ].map(s=><div key={s.label} style={{background:"#fff",borderRadius:11,padding:"12px 14px",border:"1px solid #f0f0f0"}}>
            <div style={{fontSize:10,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:3}}>{s.label}</div>
            <div style={{fontSize:16,fontWeight:800,color:s.color}}>{s.val}</div>
          </div>)}
        </div>

        {/* Tabla principal */}
        <div style={{background:"#fff",borderRadius:14,boxShadow:"0 2px 12px rgba(0,0,0,0.05)",border:"1px solid #f0f0f0",overflowX:"auto",marginBottom:16}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:"#0a1628"}}>
                {["Aseguradora","Clientes","Pólizas","Vigentes","Prima RD$","Prima USD","Comisión RD$","Comisión USD","% Cartera","Detalle"].map(h=>(
                  <th key={h} style={{padding:"11px 14px",textAlign:"left",fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.8)",textTransform:"uppercase",letterSpacing:.5,whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {cartPorAseg.map((a,i)=>{
                const pct=totalGenPols>0?Math.round(a.totalPolizas/totalGenPols*100):0;
                const isExp=expandida===a.aseguradora;
                return (
                  <React.Fragment key={a.aseguradora}>
                    <tr style={{borderTop:"1px solid #f5f5f5",background:i%2?"#fafafa":"#fff",cursor:"pointer"}} onClick={()=>setExpandida(isExp?null:a.aseguradora)}>
                      <td style={{padding:"12px 14px"}}>
                        <div style={{fontWeight:700,fontSize:14,color:"#0a0a1a"}}>{a.aseguradora}</div>
                        <div style={{width:"100%",height:4,background:"#f0f0f0",borderRadius:2,marginTop:4}}>
                          <div style={{height:4,background:"#6366f1",borderRadius:2,width:`${Math.round(a.totalPolizas/maxPols*100)}%`}}/>
                        </div>
                      </td>
                      <td style={{padding:"12px 14px",textAlign:"center"}}><span style={{background:"#6366f11a",color:"#6366f1",borderRadius:99,padding:"3px 10px",fontSize:13,fontWeight:700}}>{a.clientes}</span></td>
                      <td style={{padding:"12px 14px",textAlign:"center",fontWeight:700,fontSize:14}}>{a.totalPolizas}</td>
                      <td style={{padding:"12px 14px",textAlign:"center"}}><span style={{background:"#16a34a1a",color:"#16a34a",borderRadius:99,padding:"3px 10px",fontSize:12,fontWeight:700}}>{a.vigentes}</span></td>
                      <td style={{padding:"12px 14px",fontWeight:600,fontSize:13,color:"#0a0a1a",whiteSpace:"nowrap"}}>{a.primaRD>0?moneda(a.primaRD,"RD$"):"—"}</td>
                      <td style={{padding:"12px 14px",fontWeight:600,fontSize:13,color:"#0a0a1a",whiteSpace:"nowrap"}}>{a.primaUSD>0?moneda(a.primaUSD,"USD"):"—"}</td>
                      <td style={{padding:"12px 14px",fontWeight:600,fontSize:13,color:"#8b5cf6",whiteSpace:"nowrap"}}>{a.comisionRD>0?moneda(a.comisionRD,"RD$"):"—"}</td>
                      <td style={{padding:"12px 14px",fontWeight:600,fontSize:13,color:"#6366f1",whiteSpace:"nowrap"}}>{a.comisionUSD>0?moneda(a.comisionUSD,"USD"):"—"}</td>
                      <td style={{padding:"12px 14px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <div style={{width:40,height:6,background:"#f0f0f0",borderRadius:3}}><div style={{height:6,background:"#d97706",borderRadius:3,width:`${pct}%`}}/></div>
                          <span style={{fontSize:12,fontWeight:700,color:"#d97706"}}>{pct}%</span>
                        </div>
                      </td>
                      <td style={{padding:"12px 14px",textAlign:"center",color:"#6366f1",fontWeight:700,fontSize:16}}>{isExp?"▲":"▼"}</td>
                    </tr>
                    {isExp&&(
                      <tr style={{background:"#f8f9ff"}}>
                        <td colSpan={9} style={{padding:"0 14px 14px"}}>
                          <div style={{fontSize:12,fontWeight:700,color:"#6366f1",padding:"10px 0 8px",textTransform:"uppercase",letterSpacing:.5}}>Detalle de pólizas — {a.aseguradora}</div>
                          <table style={{width:"100%",borderCollapse:"collapse",background:"#fff",borderRadius:10,overflow:"hidden",boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
                            <thead><tr style={{background:"#f0f0f0"}}>
                              {["Cliente","N° Póliza","Ramo","Prima","Moneda","Estado","Vencimiento"].map(h=><th key={h} style={{padding:"8px 12px",textAlign:"left",fontSize:11,fontWeight:700,color:"#888",textTransform:"uppercase"}}>{h}</th>)}
                            </tr></thead>
                            <tbody>
                              {a.detalle.map((p,j)=><tr key={p.id} style={{borderTop:"1px solid #f5f5f5",background:j%2?"#fafafa":"#fff"}}>
                                <td style={{padding:"8px 12px",fontSize:13,fontWeight:600}}>{p.cliente?.nombre} {p.cliente?.apellido}</td>
                                <td style={{padding:"8px 12px",fontSize:12,color:"#666",fontFamily:"monospace"}}>{p.numero}</td>
                                <td style={{padding:"8px 12px",fontSize:12}}>{p.ramo}</td>
                                <td style={{padding:"8px 12px",fontSize:13,fontWeight:700}}>{moneda(p.prima,p.moneda)}</td>
                                <td style={{padding:"8px 12px",fontSize:12,color:"#666"}}>{p.moneda}</td>
                                <td style={{padding:"8px 12px"}}><Badge t={p.estado}/></td>
                                <td style={{padding:"8px 12px",fontSize:12,color:"#666"}}>{fmt(p.fin)}</td>
                              </tr>)}
                            </tbody>
                          </table>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
              {/* Fila total */}
              <tr style={{borderTop:"2px solid #e5e7eb",background:"#f0f9ff"}}>
                <td style={{padding:"12px 14px",fontWeight:800,fontSize:14,color:"#0a0a1a"}}>TOTAL CARTERA</td>
                <td style={{padding:"12px 14px",textAlign:"center",fontWeight:800}}>{clientes.length}</td>
                <td style={{padding:"12px 14px",textAlign:"center",fontWeight:800,fontSize:15}}>{totalGenPols}</td>
                <td style={{padding:"12px 14px",textAlign:"center",fontWeight:800,color:"#16a34a"}}>{vigentes.length}</td>
                <td style={{padding:"12px 14px",fontWeight:800,color:"#0a0a1a",whiteSpace:"nowrap"}}>{moneda(totalGenRD,"RD$")}</td>
                <td style={{padding:"12px 14px",fontWeight:800,color:"#0a0a1a",whiteSpace:"nowrap"}}>{moneda(totalGenUSD,"USD")}</td>
                <td style={{padding:"12px 14px",fontWeight:800,color:"#8b5cf6",whiteSpace:"nowrap"}}>{moneda(totalGenComRD,"RD$")}</td>
                <td style={{padding:"12px 14px",fontWeight:800,color:"#6366f1",whiteSpace:"nowrap"}}>{moneda(totalGenComUSD,"USD")}</td>
                <td style={{padding:"12px 14px",fontWeight:800}}>100%</td>
                <td/>
              </tr>
            </tbody>
          </table>
        </div>
        <div style={{fontSize:12,color:"#aaa",textStyle:"italic"}}>💡 Haz clic en una aseguradora para ver el detalle de sus pólizas. Usa el botón imprimir para exportar este reporte.</div>
      </div>}

      {/* ── COMPARATIVO ANUAL ── */}
      {subPag==="comparativo"&&(()=>{
        const anios = [...new Set(polizas.map(p=>p.inicio?p.inicio.substring(0,4):"").filter(Boolean))].sort();

        const calcAnio = (anio) => {
          // Pólizas NUEVAS = inicio en ese año Y sin periodoAnterior (no son renovaciones)
          const polsNuevas = polizas.filter(p=>p.inicio&&p.inicio.startsWith(anio)&&!p.periodoAnterior);
          // Renovaciones = inicio en ese año Y tienen periodoAnterior
          const renovaciones = polizas.filter(p=>p.inicio&&p.inicio.startsWith(anio)&&p.periodoAnterior);
          // Clientes nuevos = cuya PRIMERA póliza (sin periodoAnterior) fue en ese año
          const clientesNuevos = new Set();
          clientes.forEach(c=>{
            const polsCli = polizas.filter(p=>p.clienteId===c.id&&p.inicio&&!p.periodoAnterior).sort((a,b)=>a.inicio.localeCompare(b.inicio));
            if(polsCli.length>0&&polsCli[0].inicio.startsWith(anio)) clientesNuevos.add(c.id);
          });
          // Prima nueva = solo pólizas nuevas (sin renovaciones)
          const primaNuevaRD = polsNuevas.filter(p=>p.moneda==="RD$").reduce((a,p)=>a+(+p.prima||0),0);
          const primaNuevaUSD = polsNuevas.filter(p=>p.moneda==="USD").reduce((a,p)=>a+(+p.prima||0),0);
          // Cartera acumulada = todas las pólizas vigentes cuyo inicio fue en o antes de ese año
          // Incluye renovaciones con prima actualizada
          const vigentes = polizas.filter(p=>p.inicio&&p.inicio.substring(0,4)<=anio&&(p.estado==="Vigente"||p.estado==="Por Renovar"));
          const cartRD = vigentes.filter(p=>p.moneda==="RD$").reduce((a,p)=>a+(+p.prima||0),0);
          const cartUSD = vigentes.filter(p=>p.moneda==="USD").reduce((a,p)=>a+(+p.prima||0),0);
          // Comisiones sobre pólizas nuevas únicamente
          const comRD = polsNuevas.filter(p=>p.moneda==="RD$").reduce((a,p)=>a+(+p.prima||0)*(+p.comision||0)/100,0);
          const comUSD = polsNuevas.filter(p=>p.moneda==="USD").reduce((a,p)=>a+(+p.prima||0)*(+p.comision||0)/100,0);
          return { polsNuevas:polsNuevas.length, renovaciones:renovaciones.length, clientesNuevos:clientesNuevos.size, primaNuevaRD, primaNuevaUSD, cartRD, cartUSD, comRD, comUSD };
        };

        const datos = anios.map(a=>({anio:a,...calcAnio(a)}));
        const pct = (a,b) => a>0?((b-a)/a*100).toFixed(1)+"%":"N/A";
        const fColor = (a,b) => b>=a?"#16a34a":"#dc2626";
        const fArrow = (a,b) => b>=a?"▲":"▼";

        return (
          <div>
            <div style={{marginBottom:16}}>
              <h3 style={{fontSize:16,fontWeight:700,color:"#0a0a1a",margin:"0 0 4px"}}>📈 Comparativo Anual de Cartera</h3>
              <p style={{color:"#888",fontSize:13,margin:0}}>Métricas de crecimiento y acumulación por año</p>
            </div>

            {datos.length===0&&<div style={{padding:32,textAlign:"center",color:"#ccc"}}>No hay pólizas registradas aún</div>}

            {/* Tarjetas por año */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:14,marginBottom:20}}>
              {datos.map((d,i)=>{
                const colors=["#6366f1","#16a34a","#0ea5e9","#d97706"];
                const c=colors[i%colors.length];
                return (
                  <div key={d.anio} style={{background:"#fff",borderRadius:14,padding:18,border:`2px solid ${c}`,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"}}>
                    <div style={{fontSize:20,fontWeight:900,color:c,marginBottom:14}}>📅 {d.anio}</div>
                    {[
                      ["Clientes nuevos",d.clientesNuevos],
                      ["Pólizas nuevas",d.polsNuevas],
                      ["Renovaciones",d.renovaciones],
                      ["Prima nueva RD$",moneda(d.primaNuevaRD,"RD$")],
                      ["Prima nueva USD",moneda(d.primaNuevaUSD,"USD")],
                      ["Cartera acum. RD$",moneda(d.cartRD,"RD$")],
                      ["Cartera acum. USD",moneda(d.cartUSD,"USD")],
                      ["Comisión nueva RD$",moneda(d.comRD,"RD$")],
                      ["Comisión nueva USD",moneda(d.comUSD,"USD")],
                    ].map(([k,v])=>(
                      <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #f0f0f0"}}>
                        <span style={{fontSize:12,color:"#666"}}>{k}</span>
                        <span style={{fontSize:12,fontWeight:700,color:"#0a0a1a"}}>{v}</span>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>

            {/* Tabla crecimiento año a año */}
            {datos.length>=2&&(
              <div style={{background:"#fff",borderRadius:14,padding:18,border:"1.5px solid #f0f0f0"}}>
                <div style={{fontSize:14,fontWeight:700,color:"#0a0a1a",marginBottom:14}}>📊 Crecimiento año a año</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead>
                      <tr style={{background:"#0a1628",color:"#fff"}}>
                        <th style={{padding:"9px 12px",textAlign:"left"}}>Métrica</th>
                        {datos.map((d,i)=>i>0?<th key={d.anio} style={{padding:"9px 12px",textAlign:"center"}}>{datos[i-1].anio} → {d.anio}</th>:null)}
                      </tr>
                    </thead>
                    <tbody>
                      {[
                        ["Clientes nuevos","clientesNuevos"],
                        ["Pólizas nuevas","polsNuevas"],
                        ["Renovaciones","renovaciones"],
                        ["Prima nueva RD$","primaNuevaRD"],
                        ["Prima nueva USD","primaNuevaUSD"],
                        ["Cartera acum. RD$","cartRD"],
                        ["Cartera acum. USD","cartUSD"],
                      ].map(([label,key])=>(
                        <tr key={key} style={{borderBottom:"1px solid #f0f0f0"}}>
                          <td style={{padding:"8px 12px",color:"#555",fontWeight:600}}>{label}</td>
                          {datos.map((d,i)=>i>0?(
                            <td key={d.anio} style={{padding:"8px 12px",textAlign:"center"}}>
                              <span style={{fontWeight:700,color:fColor(datos[i-1][key],d[key])}}>
                                {fArrow(datos[i-1][key],d[key])} {pct(datos[i-1][key],d[key])}
                              </span>
                            </td>
                          ):null)}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        );
      })()}

      {/* ── RENOVACIONES PRÓXIMAS ── */}
      {subPag==="renovaciones"&&<SeccionRenovaciones polizas={polizas} clientes={clientes} gestionesRenov={gestionesRenov} setGestionesRenov={setGestionesRenov}/>}
      {subPag==="renovaciones_DISABLED"&&<div>
        {(()=>{
          const [diasFiltro, setDiasFiltro] = React.useState(60);
          const porRenovar = polizas.filter(p=>{ const d=diasHasta(p.fin); return d>=0&&d<=diasFiltro&&(p.estado==="Vigente"||p.estado==="Por Renovar"); }).sort((a,b)=>diasHasta(a.fin)-diasHasta(b.fin));

          const imprimirRenovaciones = () => {
            const win = window.open("","_blank");
            const filas = porRenovar.map(p=>{
              const cli = clientes.find(c=>c.id===p.clienteId);
              const d = diasHasta(p.fin);
              const urgencia = d<=30?"🚨 Urgente":d<=60?"⚠️ Gestionar":"📋 Planificar";
              return "<tr style='"+(d<=30?"background:#fff5f5":d<=60?"background:#fffbeb":"")+"'><td>"+cli?.nombre+" "+cli?.apellido+"</td><td>"+(cli?.telPrincipal||"—")+"</td><td>"+p.numero+"</td><td>"+p.ramo+"</td><td>"+p.aseguradora+"</td><td>"+fmt(p.fin)+"</td><td style='font-weight:700;color:"+(d<=30?"#dc2626":d<=60?"#d97706":"#16a34a")+"'>"+d+" días</td><td>"+moneda(p.prima,p.moneda)+"</td><td>"+urgencia+"</td></tr>";
            }).join("");
            win.document.write("<!DOCTYPE html><html><head><meta charset='UTF-8'/><title>Reporte Renovaciones — GEHCH</title><style>body{font-family:Arial;padding:30px;font-size:12px}h1{color:#1a3a6b;font-size:16px}table{width:100%;border-collapse:collapse;margin-top:12px}th{background:#1a3a6b;color:#fff;padding:8px;text-align:left;font-size:11px}td{padding:7px 8px;border-bottom:1px solid #eee;font-size:11px}.header{display:flex;justify-content:space-between;border-bottom:3px solid #1a3a6b;padding-bottom:12px;margin-bottom:16px}.resumen{display:flex;gap:16px;margin-bottom:16px}.res-item{background:#f8f9fa;padding:10px 16px;border-radius:6px;border-left:4px solid #1a3a6b}</style></head><body><div class='header'><div><strong style='font-size:18px;color:#1a3a6b'>🛡️ GEHCH</strong><br/><span style='font-size:11px;color:#888'>Correduría y Asesoría de Seguros</span></div><div style='text-align:right;font-size:11px;color:#888'>Reporte de Renovaciones Próximas<br/>Generado: "+new Date().toLocaleDateString("es-DO",{year:"numeric",month:"long",day:"numeric"})+"<br/>Próximos "+diasFiltro+" días</div></div><div class='resumen'><div class='res-item'><div style='font-size:10px;color:#888'>TOTAL POR RENOVAR</div><div style='font-size:20px;font-weight:800;color:#1a3a6b'>"+porRenovar.length+"</div></div><div class='res-item'><div style='font-size:10px;color:#888'>URGENTES (≤30d)</div><div style='font-size:20px;font-weight:800;color:#dc2626'>"+porRenovar.filter(p=>diasHasta(p.fin)<=30).length+"</div></div><div class='res-item'><div style='font-size:10px;color:#888'>A GESTIONAR (31-60d)</div><div style='font-size:20px;font-weight:800;color:#d97706'>"+porRenovar.filter(p=>diasHasta(p.fin)>30&&diasHasta(p.fin)<=60).length+"</div></div></div><table><thead><tr><th>Cliente</th><th>Teléfono</th><th>N° Póliza</th><th>Ramo</th><th>Aseguradora</th><th>Vencimiento</th><th>Días</th><th>Prima</th><th>Prioridad</th></tr></thead><tbody>"+filas+"</tbody></table><div style='margin-top:20px;border-top:1px solid #eee;padding-top:10px;text-align:center;font-size:10px;color:#888'>CRM GEHCH · gherrera@gehchseguros.com · (809) 284-7898</div><script>window.onload=function(){window.print();}<\/script></body></html>");
            win.document.close();
          };

          return (
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:10}}>
                <div>
                  <h3 style={{fontSize:16,fontWeight:700,color:"#0a0a1a",margin:"0 0 4px"}}>🔄 Renovaciones Próximas</h3>
                  <p style={{color:"#888",fontSize:13,margin:0}}>Pólizas que vencen en los próximos {diasFiltro} días</p>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  {[30,60,90].map(d=>(
                    <button key={d} onClick={()=>setDiasFiltro(d)} style={{padding:"6px 14px",borderRadius:99,border:"1.5px solid",fontSize:12,fontWeight:600,cursor:"pointer",borderColor:diasFiltro===d?"#0a1628":"#e5e7eb",background:diasFiltro===d?"#0a1628":"#fff",color:diasFiltro===d?"#fff":"#555"}}>{d}d</button>
                  ))}
                  <button onClick={imprimirRenovaciones} style={{padding:"8px 16px",borderRadius:8,background:"#0a1628",color:"#fff",border:"none",cursor:"pointer",fontSize:12,fontWeight:700}}>🖨️ Imprimir Reporte</button>
                </div>
              </div>

              {/* KPIs */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
                {[
                  {l:"Total por renovar",v:porRenovar.length,c:"#1a3a6b"},
                  {l:"🚨 Urgentes ≤30d",v:porRenovar.filter(p=>diasHasta(p.fin)<=30).length,c:"#dc2626"},
                  {l:"⚠️ Gestionar 31-60d",v:porRenovar.filter(p=>diasHasta(p.fin)>30&&diasHasta(p.fin)<=60).length,c:"#d97706"},
                ].map(k=>(
                  <div key={k.l} style={{background:"#fff",borderRadius:10,padding:"12px 16px",border:"1px solid #f0f0f0",boxShadow:"0 1px 6px rgba(0,0,0,0.04)"}}>
                    <div style={{fontSize:10,color:"#888",textTransform:"uppercase",marginBottom:3}}>{k.l}</div>
                    <div style={{fontSize:22,fontWeight:800,color:k.c}}>{k.v}</div>
                  </div>
                ))}
              </div>

              {/* Lista */}
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {porRenovar.map(p=>{
                  const cli=clientes.find(c=>c.id===p.clienteId);
                  const d=diasHasta(p.fin);
                  const urgente=d<=30;
                  return (
                    <div key={p.id} style={{background:"#fff",borderRadius:12,padding:"14px 18px",boxShadow:"0 2px 8px rgba(0,0,0,0.04)",border:`1.5px solid ${urgente?"#fecaca":"#fde68a"}`,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                      <div style={{flex:1,minWidth:200}}>
                        <div style={{fontWeight:700,fontSize:14,color:"#0a0a1a"}}>{cli?.nombre} {cli?.apellido}</div>
                        <div style={{fontSize:12,color:"#888",marginTop:2}}>{p.ramo} · {p.aseguradora} · <strong>{p.numero}</strong></div>
                        <div style={{fontSize:11,color:"#aaa",marginTop:1}}>Tel: {cli?.telPrincipal||"—"} · Vence: {fmt(p.fin)}</div>
                      </div>
                      <div style={{textAlign:"center"}}>
                        <div style={{fontSize:22,fontWeight:900,color:urgente?"#dc2626":"#d97706"}}>{d}</div>
                        <div style={{fontSize:10,color:"#888"}}>días</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:13,fontWeight:700,color:"#0a0a1a"}}>{moneda(p.prima,p.moneda)}</div>
                        <div style={{fontSize:11,color:"#888"}}>prima anual</div>
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <span style={{padding:"4px 10px",borderRadius:99,fontSize:11,fontWeight:700,background:urgente?"#fee2e2":"#fffbeb",color:urgente?"#dc2626":"#d97706"}}>{urgente?"🚨 Urgente":"⚠️ Gestionar"}</span>
                      </div>
                    </div>
                  );
                })}
                {porRenovar.length===0&&<div style={{padding:32,textAlign:"center",color:"#ccc",background:"#fff",borderRadius:14,border:"1px solid #f0f0f0"}}>✅ No hay pólizas por vencer en los próximos {diasFiltro} días</div>}
              </div>
            </div>
          );
        })()}
      </div>}

      {/* ── SIN PÓLIZA ACTIVA ── */}
      {subPag==="cxc"&&<SeccionCxC clientes={clientes} polizas={polizas} planes={planes} gestionesCxC={gestionesCxC} setGestionesCxC={setGestionesCxC}/>}
      {subPag==="sinpoliza"&&<div>
        <div style={{marginBottom:14,padding:"10px 16px",background:"#fff5f5",borderRadius:10,border:"1px solid #fecaca",fontSize:13,color:"#dc2626",fontWeight:600}}>
          ⚠️ {sinPoliza.length} cliente{sinPoliza.length!==1?"s":""} sin póliza activa — oportunidad de negocio
        </div>
        {sinPoliza.length===0?<div style={{padding:32,textAlign:"center",color:"#16a34a",background:"#fff",borderRadius:14,border:"1px solid #f0f0f0",fontSize:14}}>✅ Todos los clientes tienen al menos una póliza activa.</div>:
        <div style={{background:"#fff",borderRadius:14,border:"1px solid #f0f0f0",overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:"#f8f9fa"}}>{["Nombre","Documento","Teléfono","Correo","Provincia","Última Póliza"].map(h=><th key={h} style={{padding:"10px 14px",textAlign:"left",fontSize:11,fontWeight:700,color:"#999",textTransform:"uppercase",letterSpacing:.5}}>{h}</th>)}</tr></thead>
            <tbody>
              {sinPoliza.map((c,i)=>{ const ultPol=polizas.filter(p=>p.clienteId===c.id).sort((a,b)=>new Date(b.fin)-new Date(a.fin))[0]; return (
                <tr key={c.id} style={{borderTop:"1px solid #f5f5f5",background:i%2?"#fafafa":"#fff"}}>
                  <td style={{padding:"11px 14px",fontWeight:700,fontSize:14}}>{c.nombre} {c.apellido}</td>
                  <td style={{padding:"11px 14px",fontSize:12,color:"#666"}}>{c.documento}</td>
                  <td style={{padding:"11px 14px",fontSize:12,color:"#444"}}>{c.telPrincipal||"—"}</td>
                  <td style={{padding:"11px 14px",fontSize:12,color:"#666"}}>{c.email||"—"}</td>
                  <td style={{padding:"11px 14px",fontSize:12,color:"#666"}}>{c.provincia||"—"}</td>
                  <td style={{padding:"11px 14px",fontSize:12,color:"#888"}}>{ultPol?`${ultPol.ramo} · ${fmt(ultPol.fin)}`:"Nunca tuvo póliza"}</td>
                </tr>
              ); })}
            </tbody>
          </table>
        </div>}
      </div>}
    </div>
  );
}

// ═══ APP ═════════════════════════════════════════════════════════════════════
function App() {
  const [pag,setPag]=useState("dash");
  const [logueado, setLogueado] = useState(() => sessionStorage.getItem("gehch_auth")==="ok");
  const [reclamos, setReclamos] = useState(()=>cargar("gehch2:reclamos",D_RECLAMOS));
  const [aseguradorasExtra, setAseguradorasExtra] = useState(()=>cargar("gehch2:aseguradorasExtra",[]));
  const todasAseguradoras = [...ASEGURADORAS_RD.filter(a=>a!=="Otra"), ...aseguradorasExtra].sort();
  const [clientes,setClientes]=useState(()=>cargar("gehch2:clientes",D_CLI));
  const [polizas,setPolizas]=useState(()=>cargar("gehch2:polizas",D_POL));
  const [planes,setPlanes]=useState(()=>cargar("gehch2:planes",D_PLANES));
  const [beneficiarios,setBeneficiarios]=useState(()=>cargar("gehch2:beneficiarios",D_BENEFICIARIOS));
  const [contactos,setContactos]=useState(()=>cargar("gehch2:contactos",D_CONTACTOS));
  const [recordatorios,setRecordatorios]=useState(()=>cargar("gehch2:recordatorios",D_RECORDATORIOS));
  const [saved,setSaved]=useState(null);
  const [gestionesRenov,setGestionesRenov]=useState(()=>cargar("gehch2:gestionesRenov",[]));
  const [gestionesCxC,setGestionesCxC]=useState(()=>cargar("gehch2:gestionesCxC",[]));
  const [movimientos,setMovimientos]=useState(()=>cargar("gehch2:movimientos",[]));
  const [unidades,setUnidades]=useState(()=>cargar("gehch2:unidades",[]));
  const [sincronizado,setSincronizado]=useState(false);

  useEffect(()=>{
    if(sincronizado) return;
    const sincronizar = async () => {
      try {
        if(!window.fbCargar) return;
        const [cli,pol,pla,ben,con,rec,rcl,aseg,gest] = await Promise.all([
          cargarNube("gehch2:clientes",null), cargarNube("gehch2:polizas",null),
          cargarNube("gehch2:planes",null), cargarNube("gehch2:beneficiarios",null),
          cargarNube("gehch2:contactos",null), cargarNube("gehch2:recordatorios",null),
          cargarNube("gehch2:reclamos",null), cargarNube("gehch2:aseguradorasExtra",null),
          cargarNube("gehch2:gestionesRenov",null),
          cargarNube("gehch2:gestionesCxC",null),
        ]);
        if(cli) setClientes(cli); if(pol) setPolizas(pol); if(pla) setPlanes(pla);
        if(ben) setBeneficiarios(ben); if(con) setContactos(con); if(rec) setRecordatorios(rec);
        if(rcl) setReclamos(rcl); if(aseg) setAseguradorasExtra(aseg); if(gest) setGestionesRenov(gest);
        const cxc = await cargarNube("gehch2:gestionesCxC",null); if(cxc) setGestionesCxC(cxc);
        const mxv = await cargarNube("gehch2:movimientos",null); if(mxv) setMovimientos(mxv);
        const uni = await cargarNube("gehch2:unidades",null); if(uni) setUnidades(uni);
        setSincronizado(true);
      } catch(e){ console.warn("Error sincronizando:", e); }
    };
    if(window.fbListo) sincronizar();
    else window.addEventListener("fbListo", sincronizar, {once:true});
  },[]);  

  const autoSave=(k,v)=>{ guardar(k,v); setSaved("ok"); setTimeout(()=>setSaved(null),1800); };
  useEffect(()=>autoSave("gehch2:clientes",clientes),[clientes]);
  useEffect(()=>guardar("gehch2:polizas",polizas),[polizas]);
  useEffect(()=>guardar("gehch2:planes",planes),[planes]);
  useEffect(()=>guardar("gehch2:beneficiarios",beneficiarios),[beneficiarios]);
  useEffect(()=>guardar("gehch2:contactos",contactos),[contactos]);
  useEffect(()=>guardar("gehch2:recordatorios",recordatorios),[recordatorios]);
  useEffect(()=>guardar("gehch2:reclamos",reclamos),[reclamos]);
  useEffect(()=>guardar("gehch2:aseguradorasExtra",aseguradorasExtra),[aseguradorasExtra]);
  useEffect(()=>guardar("gehch2:gestionesRenov",gestionesRenov),[gestionesRenov]);
  useEffect(()=>guardar("gehch2:gestionesCxC",gestionesCxC),[gestionesCxC]);
  useEffect(()=>guardar("gehch2:movimientos",movimientos),[movimientos]);
  useEffect(()=>guardar("gehch2:unidades",unidades),[unidades]);

  const alertas=planes.filter(p=>{ const d=diasHasta(p.fecha); return (d>=0&&d<=15||d<0)&&p.estado==="Pendiente"; }).length;
  const recsAlerta=recordatorios.filter(r=>!r.completado&&diasHasta(r.fecha)<=0).length;

  const NAV=[
    {id:"dash",label:"Dashboard",icon:"dash"},
    {id:"cli",label:"Clientes",icon:"cli"},
    {id:"pol",label:"Pólizas",icon:"pol"},
    {id:"pagos",label:"Pagos",icon:"pago",badge:alertas},
    {id:"contactos",label:"Contactos",icon:"contact"},
    {id:"recordatorios",label:"Recordatorios",icon:"bell",badge:recsAlerta},
    {id:"cumple",label:"Cumpleaños",icon:"cumple"},
    {id:"reclamos",label:"Reclamaciones",icon:"claim",badge:reclamos.filter(r=>r.estado!=="Cerrado"&&Object.values(r.checklist||{}).some(v=>!v.completado)).length||undefined},
    {id:"reportes",label:"Reportes",icon:"report"},
  ];

  const exportar=()=>{ const data={clientes,polizas,planes,beneficiarios,contactos,recordatorios,reclamos,exportado:new Date().toISOString()}; const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`GEHCH-backup-${hoy()}.json`; a.click(); };
  const importarRef=useRef();
  const importar=(e)=>{ const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=ev=>{ try{ const d=JSON.parse(ev.target.result); if(d.clientes) setClientes(d.clientes); 
      // Unificar nombres de aseguradoras duplicadas
      const normalizarAseg = (nombre) => {
        if(!nombre) return nombre;
        const n = nombre.trim();
        if(["Seguro Reservas","Seguros Reservas","seguros reservas","Seguro reservas"].some(v=>v.toLowerCase()===n.toLowerCase())) return "Seguros Reservas";
        if(["Seguros Universal","Universal de Seguros","universal de seguros","seguros universal"].some(v=>v.toLowerCase()===n.toLowerCase())) return "Universal De Seguros";
        if(["Colonial de Seguros","Colonial De Seguros","colonial de seguros"].some(v=>v.toLowerCase()===n.toLowerCase())) return "Colonial De Seguros";
        if(["Mapfre","MAPFRE","mapfre bhd","Mapfre BHD"].some(v=>v.toLowerCase()===n.toLowerCase())) return "Mapfre BHD";
        return n;
      };
      if(d.polizas) setPolizas(d.polizas.map(p=>({...p, aseguradora:normalizarAseg(p.aseguradora)}))); if(d.planes) setPlanes(d.planes); if(d.beneficiarios) setBeneficiarios(d.beneficiarios); if(d.contactos) setContactos(d.contactos); if(d.recordatorios) setRecordatorios(d.recordatorios); if(d.reclamos) setReclamos(d.reclamos); alert("✅ Datos importados correctamente."); }catch(err){ alert("❌ Error al importar. Verifique el archivo."); } }; reader.readAsText(file); e.target.value=""; };

  const handleLogin = () => { sessionStorage.setItem("gehch_auth","ok"); setLogueado(true); };
  const handleLogout = () => { sessionStorage.removeItem("gehch_auth"); setLogueado(false); };

  if(!logueado) return <Login onLogin={handleLogin}/>;

  return (
    <div style={{minHeight:"100vh",display:"flex",background:"#f2f4f8"}}>
      <div style={{width:220,background:"#0a1628",minHeight:"100vh",display:"flex",flexDirection:"column",position:"fixed",top:0,left:0,height:"100vh",zIndex:100,overflowY:"auto"}}>
        <div style={{padding:"20px 16px 16px",borderBottom:"1px solid rgba(255,255,255,0.06)",textAlign:"center"}}>
          <img src={LOGO_SRC} style={{width:160,display:"block",margin:"0 auto 8px"}} alt="GEHCH"/>
          <div style={{color:"rgba(255,255,255,0.35)",fontSize:9,fontWeight:600,letterSpacing:"1px",textTransform:"uppercase"}}>Sistema de Gestión</div>
        </div>
        <nav style={{flex:1,padding:"10px 10px"}}>
          {NAV.map(n=>{ const act=pag===n.id; return (
            <button key={n.id} onClick={()=>setPag(n.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:9,padding:"10px 12px",borderRadius:9,background:act?"rgba(255,255,255,0.13)":"none",color:act?"#fff":"rgba(255,255,255,0.45)",border:"none",cursor:"pointer",fontSize:13,fontWeight:act?700:400,marginBottom:1,textAlign:"left",transition:"all .12s"}}>
              <Icon n={n.icon} size={15}/><span style={{flex:1}}>{n.label}</span>
              {n.badge>0&&<span style={{background:"#ef4444",color:"#fff",borderRadius:99,fontSize:9,fontWeight:800,padding:"2px 6px"}}>{n.badge}</span>}
            </button>
          ); })}
        </nav>
        <div style={{padding:"12px 10px",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
          <button onClick={exportar} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:8,background:"rgba(255,255,255,0.07)",color:"rgba(255,255,255,0.6)",border:"none",cursor:"pointer",fontSize:12,marginBottom:4}}><Icon n="download" size={13}/> Exportar backup</button>
          <button onClick={()=>importarRef.current.click()} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:8,background:"rgba(255,255,255,0.07)",color:"rgba(255,255,255,0.6)",border:"none",cursor:"pointer",fontSize:12}}><Icon n="upload" size={13}/> Importar datos</button>
          <input ref={importarRef} type="file" accept=".json" onChange={importar} style={{display:"none"}}/>
          <div style={{marginTop:8,fontSize:10,textAlign:"center"}}>
            {saved==="ok"?<span style={{color:"#4ade80"}}>✅ Guardado</span>:<span style={{color:"rgba(255,255,255,0.2)"}}>© 2025 CRM GEHCH</span>}
          <button onClick={handleLogout} style={{marginTop:8,width:"100%",padding:"6px",background:"rgba(255,255,255,0.07)",color:"rgba(255,255,255,0.45)",border:"none",borderRadius:7,cursor:"pointer",fontSize:11}}>🔒 Cerrar sesión</button>
          </div>
        </div>
      </div>
      <div style={{flex:1,marginLeft:220,padding:"28px 24px",minWidth:0}}>
        {pag==="dash"         && <Dashboard clientes={clientes} polizas={polizas} planes={planes} recordatorios={recordatorios} setRecordatorios={setRecordatorios}/>}
        {pag==="cli"          && <Clientes clientes={clientes} setClientes={setClientes} polizas={polizas} planes={planes}/>}
        {pag==="pol"          && <Polizas polizas={polizas} setPolizas={setPolizas} clientes={clientes} planes={planes} setPlanes={setPlanes} beneficiarios={beneficiarios} setBeneficiarios={setBeneficiarios} todasAseguradoras={todasAseguradoras} setAseguradorasExtra={setAseguradorasExtra} aseguradorasExtra={aseguradorasExtra} movimientos={movimientos} setMovimientos={setMovimientos} unidades={unidades} setUnidades={setUnidades}/>}
        {pag==="pagos"        && <PagosGeneral planes={planes} setPlanes={setPlanes} polizas={polizas} clientes={clientes}/>}
        {pag==="contactos"    && <Contactos contactos={contactos} setContactos={setContactos} clientes={clientes}/>}
        {pag==="recordatorios"&& <Recordatorios recordatorios={recordatorios} setRecordatorios={setRecordatorios} clientes={clientes}/>}
        {pag==="cumple"       && <Cumpleanios clientes={clientes}/>}
        {pag==="reclamos"     && <Reclamaciones reclamos={reclamos} setReclamos={setReclamos} polizas={polizas} clientes={clientes} planes={planes}/>}
        {pag==="reportes"     && <Reportes clientes={clientes} polizas={polizas} planes={planes} gestionesRenov={gestionesRenov} setGestionesRenov={setGestionesRenov} gestionesCxC={gestionesCxC} setGestionesCxC={setGestionesCxC}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
