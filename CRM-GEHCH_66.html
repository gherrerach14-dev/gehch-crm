// ═══ PAGOS ════════════════════════════════════════════════════════════════════
function PagosGeneral({ planes,setPlanes,polizas,clientes }) {
  const [filtro,setFiltro]=useState("todos"); const [pagoModal,setPagoModal]=useState(null); const [formPago,setFormPago]=useState({}); const [buscar,setBuscar]=useState("");
  const cuotas=planes.map(cu=>{ const pol=polizas.find(p=>p.id===cu.polizaId); const cli=clientes.find(c=>c.id===pol?.clienteId); const d=diasHasta(cu.fecha); const estadoReal=cu.estado==="Pagado"?"Pagado":d<0?"Vencido":d<=15?"Próximo":"Pendiente"; return {...cu,pol,cli,d,estadoReal}; }).sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  const registrar=()=>{
    const montoPagado = formPago.montoPagado!==undefined&&formPago.montoPagado!==""?Number(formPago.montoPagado):pagoModal.monto;
    const diferencia = montoPagado - pagoModal.monto;
    // Obtener cuotas pendientes de la misma poliza (excluyendo la actual)
    const todasCuotasPoliza = planes.filter(x=>x.polizaId===pagoModal.polizaId).sort((a,b)=>a.numero-b.numero);
    const cuotasPagadas = todasCuotasPoliza.filter(x=>x.id!==pagoModal.id && x.estado==="Pagado");
    const cuotasPendientes = todasCuotasPoliza.filter(x=>x.id!==pagoModal.id && (x.estado==="Pendiente"||x.estado==="Vencido")).sort((a,b)=>a.numero-b.numero);
    // Calcular saldo desde prima total - lo ya pagado - este pago
    const polizaActual = polizas.find(p=>p.id===pagoModal.polizaId);
    const primaTotal = polizaActual?.prima || todasCuotasPoliza.reduce((a,c)=>a+c.monto,0);
    const totalYaPagado = cuotasPagadas.reduce((a,c)=>a+(c.montoPagado||c.monto),0);
    const saldoRestante = primaTotal - totalYaPagado - montoPagado;
    setPlanes(p=>p.map(x=>{
      if(x.id===pagoModal.id) return {...x, estado:"Pagado", fechaPago:formPago.fechaPago||hoy(), notaPago:formPago.notaPago||"", montoPagado};
      // Recalcular cuotas pendientes/vencidas desde saldo real
      if(cuotasPendientes.find(c=>c.id===x.id)){
        const nuevaMonto = cuotasPendientes.length > 0 ? saldoRestante / cuotasPendientes.length : 0;
        return {...x, monto: Math.max(0, nuevaMonto)};
      }
      return x;
    }));
    setPagoModal(null);
  };
  const tabs=[{k:"todos",l:"Todas",n:cuotas.length},{k:"proximas",l:"Próximas",n:cuotas.filter(c=>c.estadoReal==="Próximo").length},{k:"vencidas",l:"Vencidas",n:cuotas.filter(c=>c.estadoReal==="Vencido").length},{k:"pendientes",l:"Pendientes",n:cuotas.filter(c=>c.estadoReal==="Pendiente").length},{k:"pagadas",l:"Pagadas",n:cuotas.filter(c=>c.estadoReal==="Pagado").length}];
  const filtradas2=cuotas.filter(cu=>{
    const matchFiltro = filtro==="todos" || cu.estadoReal===({proximas:"Próximo",vencidas:"Vencido",pendientes:"Pendiente",pagadas:"Pagado"}[filtro]);
    const matchBuscar = !buscar || `${cu.cli?.nombre} ${cu.cli?.apellido} ${cu.cli?.documento} ${cu.pol?.numero} ${cu.pol?.aseguradora} ${cu.pol?.ramo}`.toLowerCase().includes(buscar.toLowerCase());
    return matchFiltro && matchBuscar;
  });
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:10}}>
        <div><h2 style={{fontSize:22,fontWeight:900,color:"#0a0a1a",margin:0}}>Pagos y Cuotas</h2><p style={{color:"#888",fontSize:12,margin:"2px 0 0"}}>Seguimiento de todos los planes de pago</p></div>
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",color:"#bbb",display:"flex"}}><Icon n="search" size={14}/></span>
          <input value={buscar} onChange={e=>setBuscar(e.target.value)} placeholder="Nombre, cédula, N° póliza..." style={{padding:"7px 11px 7px 30px",border:"1.5px solid #e5e7eb",borderRadius:8,fontSize:13,width:230,outline:"none"}}/>
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
        {tabs.map(t=><button key={t.k} onClick={()=>setFiltro(t.k)} style={{padding:"6px 13px",borderRadius:99,border:"1.5px solid",fontSize:12,fontWeight:600,cursor:"pointer",borderColor:filtro===t.k?"#0a1628":"#e5e7eb",background:filtro===t.k?"#0a1628":"#fff",color:filtro===t.k?"#fff":"#555"}}>{t.l} <span style={{opacity:.6}}>({t.n})</span></button>)}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {filtradas2.map(cu=>{ const vencida=cu.estadoReal==="Vencido"; const proxima=cu.estadoReal==="Próximo"; const pagada=cu.estadoReal==="Pagado"; const bg=pagada?"#f0fdf4":vencida?"#fff5f5":proxima?"#fffbeb":"#fff"; const border=pagada?"#bbf7d0":vencida?"#fecaca":proxima?"#fde68a":"#e5e7eb";
          return <div key={cu.id} style={{background:bg,border:`1.5px solid ${border}`,borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:180}}><div style={{fontWeight:700,fontSize:14,color:"#0a0a1a"}}>{cu.cli?.nombre} {cu.cli?.apellido}</div><div style={{fontSize:11,color:"#888",marginTop:1}}>{cu.pol?.aseguradora} · {cu.pol?.ramo} · {cu.pol?.numero} · Cuota {cu.numero}/{cu.total}</div>{pagada&&<div style={{fontSize:11,color:"#16a34a",marginTop:2}}>✅ {fmt(cu.fechaPago)} · {moneda(cu.montoPagado||cu.monto,cu.pol?.moneda)}{cu.notaPago?` · ${cu.notaPago}`:""}</div>}{vencida&&<div style={{fontSize:11,color:"#dc2626",fontWeight:600,marginTop:2}}>⚠️ Vencida hace {Math.abs(cu.d)}d</div>}{proxima&&<div style={{fontSize:11,color:"#d97706",fontWeight:600,marginTop:2}}>🔔 En {cu.d}d</div>}</div>
            <div style={{textAlign:"right"}}><div style={{fontWeight:800,fontSize:15}}>{moneda(cu.estado==="Pagado"?(cu.montoPagado||cu.monto):cu.monto,cu.pol?.moneda)}</div><div style={{fontSize:11,color:"#888"}}>{fmt(cu.fecha)}</div></div>
            <Badge t={cu.estadoReal==="Próximo"?"Pendiente":cu.estadoReal}/>
            {cu.estado==="Pendiente"&&<Btn sm onClick={()=>{setPagoModal(cu);setFormPago({fechaPago:hoy(),notaPago:"",montoPagado:String(cu.monto)});}}><Icon n="check" size={12}/> Registrar Pago</Btn>}
              {cu.estado==="Pendiente"&&<Btn sm sec onClick={()=>{ const nuevaFecha=window.prompt("Ingrese la fecha correcta (YYYY-MM-DD):",cu.fecha); if(nuevaFecha&&/^\d{4}-\d{2}-\d{2}$/.test(nuevaFecha)){ setPlanes(p=>p.map(x=>x.id===cu.id?{...x,fecha:nuevaFecha}:x)); } else if(nuevaFecha){ alert("Formato incorrecto. Use YYYY-MM-DD, ejemplo: 2025-12-01"); } }}><Icon n="edit" size={12}/> Editar Fecha</Btn>}
              {cu.estado==="Pagado"&&<Btn sm danger onClick={()=>{ const pin=window.prompt("Ingrese PIN de administrador para anular este pago:"); if(pin==="Klodomiro1234"){ if(window.confirm("¿Confirma anular el pago de "+moneda(cu.monto,cu.pol?.moneda)+" de "+cu.cli?.nombre+" "+cu.cli?.apellido+"? Esta acción revertirá el pago.")){ setPlanes(p=>p.map(x=>x.id===cu.id?{...x,estado:"Pendiente",fechaPago:null,notaPago:"",montoPagado:null}:x)); } } else if(pin!==null){ alert("PIN incorrecto. Acceso denegado."); } }}>↩️ Anular</Btn>}
              {cu.estado==="Pendiente"&&<button onClick={()=>abrirGoogleCalendar(`💰 Pago Cuota ${cu.numero}/${cu.total} - ${cu.pol?.aseguradora}`,cu.fecha,`Cliente: ${cu.cli?.nombre} ${cu.cli?.apellido}\nPóliza: ${cu.pol?.numero}\nRamo: ${cu.pol?.ramo}\nMonto: ${moneda(cu.monto,cu.pol?.moneda)}\nAseguradora: ${cu.pol?.aseguradora}`)} style={{padding:"5px 10px",borderRadius:7,border:"1px solid #4285f4",background:"#fff",color:"#4285f4",cursor:"pointer",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",gap:4}}><span>📅</span> Google Cal</button>}
          </div>;
        })}
        {filtradas2.length===0&&<div style={{padding:32,textAlign:"center",color:"#ccc",background:"#fff",borderRadius:14,border:"1px solid #f0f0f0"}}>No hay cuotas en esta categoría.</div>}
      </div>
      {pagoModal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:400,boxShadow:"0 20px 60px rgba(0,0,0,0.25)",padding:24}}>
          <h3 style={{margin:"0 0 14px",fontSize:15,fontWeight:800}}>Registrar Pago — Cuota {pagoModal.numero}</h3>
          <div style={{padding:"9px 12px",background:"#f0f9ff",borderRadius:8,marginBottom:14,fontSize:12}}><strong>{pagoModal.cli?.nombre} {pagoModal.cli?.apellido}</strong><br/>{pagoModal.pol?.ramo} · <strong>{moneda(pagoModal.monto,pagoModal.pol?.moneda)}</strong></div>
          <Campo label="Monto Pagado">
            <Inp type="number" value={formPago.montoPagado!==undefined&&formPago.montoPagado!==null?formPago.montoPagado:pagoModal.monto} onChange={e=>setFormPago(f=>({...f,montoPagado:e.target.value}))}/>
            {Number(formPago.montoPagado||pagoModal.monto) !== pagoModal.monto && Number(formPago.montoPagado||pagoModal.monto) > 0 && (
              <div style={{marginTop:6,padding:"6px 10px",background:Number(formPago.montoPagado||pagoModal.monto)>pagoModal.monto?"#f0fdf4":"#fffbeb",borderRadius:7,fontSize:12,color:Number(formPago.montoPagado||pagoModal.monto)>pagoModal.monto?"#16a34a":"#d97706",fontWeight:600}}>
                {Number(formPago.montoPagado||pagoModal.monto)>pagoModal.monto?"💡 Pago mayor":"⚠️ Pago menor"} — las {planes.filter(x=>x.polizaId===pagoModal.polizaId&&x.id!==pagoModal.id&&x.estado==="Pendiente").length} cuotas restantes se recalcularán automáticamente
              </div>
            )}
          </Campo>
          <Campo label="Fecha de Pago"><Inp type="date" value={formPago.fechaPago||hoy()} onChange={e=>setFormPago(f=>({...f,fechaPago:e.target.value}))}/></Campo>
          <Campo label="Referencia / Nota"><Txta value={formPago.notaPago||""} onChange={e=>setFormPago(f=>({...f,notaPago:e.target.value}))} placeholder="Banco, referencia..."/></Campo>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}><Btn sec onClick={()=>setPagoModal(null)}>Cancelar</Btn><Btn onClick={registrar}><Icon n="check" size={13}/> Confirmar Pago</Btn></div>

    </div>
  );

// ═══ RECORDATORIOS ════════════════════════════════════════════════════════════
function Recordatorios({ recordatorios,setRecordatorios,clientes }) {
  const [modal,setModal]=useState(false); const [form,setForm]=useState({});
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));
  const pendientes=recordatorios.filter(r=>!r.completado).sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  const completados=recordatorios.filter(r=>r.completado);
  const guardar=()=>{ if(!form.titulo||!form.fecha) return; setRecordatorios(p=>[...p,{...form,id:Date.now(),clienteId:Number(form.clienteId)||null,completado:false}]); setModal(false); };
  const toggle=(id)=>setRecordatorios(p=>p.map(r=>r.id===id?{...r,completado:!r.completado}:r));
  const eliminar=(id)=>setRecordatorios(p=>p.filter(r=>r.id!==id));
  const RCard=({r})=>{ const cli=clientes.find(c=>c.id===r.clienteId); const d=diasHasta(r.fecha); const hoyEsCumple=d<=0&&!r.completado;
    return <div style={{background:"#fff",borderRadius:11,padding:"12px 16px",border:`1.5px solid ${hoyEsCumple?"#ef4444":r.completado?"#bbf7d0":"#e5e7eb"}`,display:"flex",alignItems:"center",gap:12}}>

      <Btn sm danger onClick={()=>eliminar(r.id)}><Icon n="trash" size={11}/></Btn>
    </div>;
  };
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:10}}>

        <Btn onClick={()=>{setForm({titulo:"",clienteId:"",fecha:hoy(),nota:""});setModal(true);}}><Icon n="plus" size={14}/> Nuevo Recordatorio</Btn>
      </div>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Pendientes ({pendientes.length})</div>
        <div style={{display:"flex",flexDirection:"column",gap:7}}>{pendientes.map(r=><RCard key={r.id} r={r}/>)}{pendientes.length===0&&<div style={{padding:24,textAlign:"center",color:"#ccc",background:"#fff",borderRadius:12,border:"1px solid #f0f0f0"}}>✅ No hay recordatorios pendientes.</div>}</div>
      </div>
      {completados.length>0&&<div>
        <div style={{fontSize:12,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Completados ({completados.length})</div>
        <div style={{display:"flex",flexDirection:"column",gap:7}}>{completados.slice(0,5).map(r=><RCard key={r.id} r={r}/>)}</div>
      </div>}
      {modal&&<Modal titulo="Nuevo Recordatorio" onClose={()=>setModal(false)}>
        <Campo label="Título *"><Inp value={form.titulo||""} onChange={e=>F("titulo",e.target.value)} placeholder="Llamar a cliente, enviar cotización..."/></Campo>
        <Row><Campo label="Fecha *" half><Inp type="date" value={form.fecha||hoy()} onChange={e=>F("fecha",e.target.value)}/></Campo><Campo label="Cliente (opcional)" half><Sel value={form.clienteId||""} onChange={e=>F("clienteId",e.target.value)}><option value="">-- Ninguno --</option>{clientes.map(c=><option key={c.id} value={c.id}>{c.nombre} {c.apellido}</option>)}</Sel></Campo></Row>
        <Campo label="Nota"><Txta value={form.nota||""} onChange={e=>F("nota",e.target.value)} rows={2} placeholder="Detalles adicionales..."/></Campo>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}><Btn sec onClick={()=>setModal(false)}>Cancelar</Btn><Btn onClick={guardar}><Icon n="check" size={13}/> Guardar</Btn></div>
      </Modal>}
    </div>
  );
}



// ═══ ESTADO DE CUENTA 360° ══════════════════════════════════════════════════

  const cuotasPagadas = planes.filter(cu=>{ const pol=polizas.find(p=>p.id===cu.polizaId); return pol?.clienteId===Number(clienteSel)&&cu.estado==="Pagado"; }).sort((a,b)=>new Date(b.fechaPago)-new Date(a.fechaPago)).slice(0,5);
  const proximasRenovar = polsCli.filter(p=>{ const d=diasHasta(p.fin); return d>=0&&d<=15; });

><div style='font-size:16px;font-weight:800;color:#1a3a6b;margin-bottom:6px'>"+cli?.nombre+" "+cli?.apellido+"</div><div>"+cli?.tipoDoc+": <strong>"+cli?.documento+"</strong> &nbsp;|&nbsp; Tel: <strong>"+(cli?.telPrincipal||"—")+"</strong> &nbsp;|&nbsp; Correo: <strong>"+(cli?.email||"—")+"</strong></div>"+
    (cli?.ciudad?"<div>"+cli?.ciudad+", "+cli?.provincia+"</div>":"")+

    (mensaje?"<div class='mensaje'>"+mensaje+"</div>":"")+
    (proximasRenovar.length>0?"<div class='alerta'>🚨 ATENCIÓN: "+proximasRenovar.length+" póliza"+(proximasRenovar.length!==1?"s":"")+" próxima"+(proximasRenovar.length!==1?"s":"")+" a vencer en los próximos 15 días</div>":"")+

            {l:"Por renovar (15d)",v:proximasRenovar.length,c:proximasRenovar.length>0?"#dc2626":"#16a34a"},

            <div style={{fontSize:10,color:"#888",textTransform:"uppercase",marginBottom:2}}>{k.l}</div>
            <div style={{fontSize:16,fontWeight:800,color:k.c}}>{k.v}</div>
          </div>)}
        </div>

        {proximasRenovar.length>0&&<div style={{background:"#fff5f5",border:"1px solid #fecaca",borderRadius:9,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#dc2626",fontWeight:600}}>
          🚨 {proximasRenovar.length} póliza{proximasRenovar.length!==1?"s":""} vence{proximasRenovar.length===1?"":"n"} en los próximos 15 días
        </div>}

        <Campo label="Mensaje personalizado (opcional)">
          <Txta value={mensaje} onChange={e=>setMensaje(e.target.value)} placeholder="Estimado cliente, adjunto encontrará el resumen de sus coberturas activas..." rows={2}/>

        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <input type="checkbox" id="comision" checked={mostrarComision} onChange={e=>setMostrarComision(e.target.checked)} style={{width:14,height:14}}/>
          <label htmlFor="comision" style={{fontSize:12,color:"#666",cursor:"pointer"}}>Incluir comisiones en el reporte (solo uso interno)</label>
        </div>

        {movimientos.filter(m=>polsCli.find(p=>p.id===m.polizaId)).length>0&&<div style={{marginBottom:14}}><div style={{fontSize:12,fontWeight:700,color:"#0a1628",marginBottom:8}}>📊 Historial de Movimientos</div>{movimientos.filter(m=>polsCli.find(p=>p.id===m.polizaId)).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).map(m=>{ const pol=polsCli.find(p=>p.id===m.polizaId); return(<div key={m.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:m.tipo==="credito"?"#f0fdf4":"#fff7ed",borderRadius:8,border:"1px solid",borderColor:m.tipo==="credito"?"#bbf7d0":"#fed7aa",marginBottom:5}}><span>{m.tipo==="credito"?"📉":"📈"}</span><div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:m.tipo==="credito"?"#166534":"#9a3412"}}>{m.tipo==="credito"?"Nota de Credito":"Endoso de Aumento"}</div><div style={{fontSize:11,color:"#666"}}>{pol?.ramo} - {pol?.numero} - {m.descripcion}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:800,color:m.tipo==="credito"?"#166534":"#9a3412"}}>{m.tipo==="credito"?"-":"+"}{moneda(m.monto,pol?.moneda||"RD$")}</div><div style={{fontSize:10,color:"#888"}}>{fmt(m.fecha)}</div></div></div>); })}</div>}
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <Btn sec onClick={onClose}>Cancelar</Btn>
          <Btn onClick={imprimir}>🖨️ Generar e Imprimir Estado de Cuenta</Btn>
        </div>
      </>}
      {!cli&&clienteSel&&<div style={{color:"#bbb",textAlign:"center",padding:20}}>Seleccione un cliente para ver su estado de cuenta.</div>}
    </Modal>
  );
}

  };

  const guardarReclamo = () => {
    if(!form.clienteId||!form.polizaId) return alert("Seleccione cliente y póliza.");
    const pol = polizas.find(p=>p.id===Number(form.polizaId));
    const checkItems = CHECKLIST_RAMO[pol?.ramo]||CHECKLIST_RAMO["Otro"];
    const checklistInicial = {};
    checkItems.forEach(item=>{ checklistInicial[item] = form.checklist?.[item] || { completado:false, fecha:null, nota:"" }; });
    const nuevoReclamo = {...form, id:Date.now(), clienteId:Number(form.clienteId), polizaId:Number(form.polizaId), montoEstimado:Number(form.montoEstimado||0), montoIndemnizado:Number(form.montoIndemnizado||0), checklist:checklistInicial, historial:[{fecha:hoy(), accion:"Reclamo aperturado", nota:form.descripcion}] };
    if(form.id) setReclamos(p=>p.map(r=>r.id===form.id?{...nuevoReclamo,id:form.id,historial:form.historial||[]}:r));
    else setReclamos(p=>[...p,nuevoReclamo]);
    setModal(null);
  };

  const eliminar = (id) => { if(window.confirm("¿Eliminar este reclamo?")) setReclamos(p=>p.filter(r=>r.id!==id)); };

  const activos = reclamos.filter(r=>r.estado!=="Cerrado");
  const cerrados = reclamos.filter(r=>r.estado==="Cerrado");
  const filtrados = filtro==="activos" ? activos : filtro==="cerrados" ? cerrados : reclamos;

  const pendientesDoc = (r) => {
    if(!r.checklist) return 0;
    return Object.values(r.checklist).filter(v=>!v.completado).length;
  };

  const COLOR_ESTADO = { "Abierto":"#dc2626","En proceso":"#d97706","Pendiente cliente":"#6366f1","Pendiente aseguradora":"#0ea5e9","Cerrado":"#16a34a" };

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:900,color:"#0a0a1a",margin:0}}>Reclamaciones</h2>
          <p style={{color:"#888",fontSize:12,margin:"2px 0 0"}}>{activos.length} activos · {cerrados.length} cerrados</p>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{display:"flex",gap:4}}>
            {[{k:"activos",l:"Activos"},{k:"cerrados",l:"Cerrados"},{k:"todos",l:"Todos"}].map(t=>(
              <button key={t.k} onClick={()=>setFiltro(t.k)} style={{padding:"6px 13px",borderRadius:99,border:"1.5px solid",fontSize:12,fontWeight:600,cursor:"pointer",borderColor:filtro===t.k?"#0a1628":"#e5e7eb",background:filtro===t.k?"#0a1628":"#fff",color:filtro===t.k?"#fff":"#555"}}>{t.l}</button>
            ))}
          </div>
          <Btn onClick={abrirNuevo}><Icon n="plus" size={14}/> Nuevo Reclamo</Btn>
        </div>
      </div>

      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10,marginBottom:18}}>
        {[
          {label:"Abiertos",val:reclamos.filter(r=>r.estado==="Abierto").length,color:"#dc2626"},
          {label:"En proceso",val:reclamos.filter(r=>r.estado==="En proceso").length,color:"#d97706"},
          {label:"Pend. cliente",val:reclamos.filter(r=>r.estado==="Pendiente cliente").length,color:"#6366f1"},
          {label:"Pend. aseguradora",val:reclamos.filter(r=>r.estado==="Pendiente aseguradora").length,color:"#0ea5e9"},
          {label:"Cerrados",val:cerrados.length,color:"#16a34a"},
        ].map(k=>(
          <div key={k.label} style={{background:"#fff",borderRadius:11,padding:"12px 14px",border:"1px solid #f0f0f0",boxShadow:"0 1px 6px rgba(0,0,0,0.04)"}}>
            <div style={{fontSize:10,color:"#888",textTransform:"uppercase",letterSpacing:.5,marginBottom:3}}>{k.label}</div>
            <div style={{fontSize:20,fontWeight:800,color:k.color}}>{k.val}</div>
          </div>
        ))}
      </div>

      {/* Lista de reclamos */}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {filtrados.map((r,i)=>{
          const cli=clientes.find(c=>c.id===r.clienteId);
          const pol=polizas.find(p=>p.id===r.polizaId);
          const pendDoc=pendientesDoc(r);
          const color=COLOR_ESTADO[r.estado]||"#6b7280";
          return (
            <div key={r.id} style={{background:"#fff",borderRadius:12,padding:"14px 18px",boxShadow:"0 2px 8px rgba(0,0,0,0.04)",border:`1.5px solid ${pendDoc>0&&r.estado!=="Cerrado"?"#fecaca":"#f0f0f0"}`}}>
              <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:200}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                    <span style={{fontWeight:700,fontSize:15,color:"#0a0a1a"}}>{cli?.nombre} {cli?.apellido}</span>
                    <Badge t={r.estado}/>
                    {pendDoc>0&&r.estado!=="Cerrado"&&<span style={{background:"#fee2e2",color:"#dc2626",borderRadius:99,fontSize:10,fontWeight:700,padding:"2px 8px"}}>⚠️ {pendDoc} doc. pendiente{pendDoc!==1?"s":""}</span>}
                  </div>
                  <div style={{fontSize:12,color:"#888"}}>{pol?.ramo} · {pol?.numero} · {r.tipoSiniestro}</div>
                  <div style={{fontSize:11,color:"#aaa",marginTop:2}}>Apertura: {fmt(r.fechaApertura)} {r.numeroReclamo?`· Reclamo: ${r.numeroReclamo}`:""}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  {r.montoEstimado>0&&<div style={{fontSize:12,color:"#888"}}>Est: {moneda(r.montoEstimado,pol?.moneda)}</div>}
                  {r.montoIndemnizado>0&&<div style={{fontSize:13,fontWeight:700,color:"#16a34a"}}>Indemnizado: {moneda(r.montoIndemnizado,pol?.moneda)}</div>}
                </div>
                <div style={{display:"flex",gap:5}}>
                  <Btn sm sec onClick={()=>setVerDetalle(r)} title="Ver detalle"><Icon n="search" size={12}/></Btn>
                  <Btn sm sec onClick={()=>{setForm({...r});setModal("form");}}><Icon n="edit" size={12}/></Btn>
                  <Btn sm danger onClick={()=>eliminar(r.id)}><Icon n="trash" size={12}/></Btn>
                </div>
              </div>
            </div>
          );
        })}
        {filtrados.length===0&&<div style={{padding:32,textAlign:"center",color:"#ccc",background:"#fff",borderRadius:14,border:"1px solid #f0f0f0"}}>No hay reclamos en esta categoría.</div>}
      </div>

      {/* Modal nuevo/editar reclamo */}
      {modal==="form"&&(
        <Modal titulo={form.id?"Editar Reclamo":"Nuevo Reclamo"} onClose={()=>setModal(null)} wide>
          <Row>
            <Campo label="Cliente *" half>
              <Sel value={form.clienteId||""} onChange={e=>{F("clienteId",e.target.value);F("polizaId","");}}>
                <option value="">-- Seleccionar --</option>
                {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre} {c.apellido}</option>)}
              </Sel>
            </Campo>
            <Campo label="Póliza *" half>
              <Sel value={form.polizaId||""} onChange={e=>F("polizaId",e.target.value)}>
                <option value="">-- Seleccionar --</option>
                {polizas.filter(p=>!form.clienteId||p.clienteId===Number(form.clienteId)).map(p=><option key={p.id} value={p.id}>{p.ramo} · {p.numero}</option>)}
              </Sel>
            </Campo>
          </Row>
          <Row>
            <Campo label="N° Reclamo Aseguradora" half><Inp value={form.numeroReclamo||""} onChange={e=>F("numeroReclamo",e.target.value)} placeholder="Número asignado por aseguradora"/></Campo>
            <Campo label="Fecha de Apertura" half><Inp type="date" value={form.fechaApertura||hoy()} onChange={e=>F("fechaApertura",e.target.value)}/></Campo>
          </Row>
          <Row>
            <Campo label="Tipo de Siniestro" half><Inp value={form.tipoSiniestro||""} onChange={e=>F("tipoSiniestro",e.target.value)} placeholder="Accidente, robo, enfermedad..."/></Campo>
            <Campo label="Estado" half>
              <Sel value={form.estado||"Abierto"} onChange={e=>F("estado",e.target.value)}>
                {ESTADOS_RECLAMO.map(e=><option key={e}>{e}</option>)}
              </Sel>
            </Campo>
          </Row>
          <Campo label="Descripción del siniestro"><Txta value={form.descripcion||""} onChange={e=>F("descripcion",e.target.value)} placeholder="Descripción detallada del incidente..."/></Campo>
          <Row>
            <Campo label="Monto Estimado" half><Inp type="number" value={form.montoEstimado||""} onChange={e=>F("montoEstimado",e.target.value)} placeholder="0.00"/></Campo>
            <Campo label="Monto Indemnizado" half><Inp type="number" value={form.montoIndemnizado||""} onChange={e=>F("montoIndemnizado",e.target.value)} placeholder="0.00"/></Campo>
          </Row>
          {form.estado==="Cerrado"&&<Campo label="Resultado">
            <Sel value={form.resultado||"Aprobado"} onChange={e=>F("resultado",e.target.value)}>
              {RESULTADOS_RECLAMO.map(r=><option key={r}>{r}</option>)}
            </Sel>
          </Campo>}
          <Campo label="Notas internas"><Txta value={form.notas||""} onChange={e=>F("notas",e.target.value)} placeholder="Observaciones del proceso..."/></Campo>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>
            <Btn sec onClick={()=>setModal(null)}>Cancelar</Btn>
            <Btn onClick={guardarReclamo}><Icon n="check" size={13}/> {form.id?"Guardar":"Crear Reclamo"}</Btn>
          </div>
        </Modal>
      )}

      {/* Modal detalle con checklist */}
      {verDetalle&&<DetalleReclamo reclamo={verDetalle} setReclamos={setReclamos} reclamos={reclamos} clientes={clientes} polizas={polizas} onClose={()=>setVerDetalle(null)}/>}
    </div>
  );
}

function DetalleReclamo({ reclamo, setReclamos, reclamos, clientes, polizas, onClose }) {
  const cli = clientes.find(c=>c.id===reclamo.clienteId);
  const pol = polizas.find(p=>p.id===reclamo.polizaId);
  const checkItems = CHECKLIST_RAMO[pol?.ramo]||CHECKLIST_RAMO["Otro"];
  const [nota, setNota] = useState("");
  const [tab, setTab] = useState("checklist");

  const toggleCheck = (item) => {
    setReclamos(prev=>prev.map(r=>{
      if(r.id!==reclamo.id) return r;
      const newCheck = {...(r.checklist||{})};
      newCheck[item] = { completado:!newCheck[item]?.completado, fecha:!newCheck[item]?.completado?hoy():null, nota:newCheck[item]?.nota||"" };
      return {...r, checklist:newCheck};
    }));
  };

  const agregarHistorial = () => {
    if(!nota) return;
    setReclamos(prev=>prev.map(r=>{
      if(r.id!==reclamo.id) return r;
      const hist = [...(r.historial||[]), {fecha:hoy(), accion:"Gestión registrada", nota}];
      return {...r, historial:hist};
    }));
    setNota("");
  };

  const addGoogleCal = () => {
    const titulo = `⚠️ Reclamo pendiente - ${cli?.nombre} ${cli?.apellido} - ${pol?.ramo}`;
    const desc = `Póliza: ${pol?.numero}\nReclamo: ${reclamo.numeroReclamo||"Sin número"}\nPendientes: ${Object.entries(reclamo.checklist||{}).filter(([,v])=>!v.completado).map(([k])=>k).join(", ")}`;
    const fechaGCal = hoy().replace(/-/g,"");
    const params = new URLSearchParams({action:"TEMPLATE",text:titulo,dates:`${fechaGCal}/${fechaGCal}`,details:desc});
    window.open("https://calendar.google.com/calendar/render?"+params.toString(),"_blank");
  };

  const completados = checkItems.filter(item=>reclamo.checklist?.[item]?.completado).length;
  const pct = Math.round(completados/checkItems.length*100);

  const imprimirReporte = () => {
    const win = window.open("","_blank");
    const rows = checkItems.map(item=>{
      const c = reclamo.checklist?.[item];
      return "<tr><td>"+item+"</td><td style='text-align:center'>"+(c?.completado?"✅":"❌")+"</td><td>"+(c?.fecha?fmt(c.fecha):"—")+"</td><td>"+(c?.nota||"—")+"</td></tr>";
    }).join("");
    const hist = (reclamo.historial||[]).map(h=>"<tr><td>"+fmt(h.fecha)+"</td><td>"+h.accion+"</td><td>"+h.nota+"</td></tr>").join("");
    win.document.write("<!DOCTYPE html><html><head><meta charset='UTF-8'/><title>Reclamo - "+cli?.nombre+" "+cli?.apellido+"</title><style>body{font-family:Arial;padding:30px;color:#222}h1{font-size:18px;color:#1a3a6b}h2{font-size:14px;color:#1a3a6b;margin-top:20px}table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}th{background:#1a3a6b;color:#fff;padding:8px}td{padding:7px;border-bottom:1px solid #eee}.info{background:#f8f9fa;padding:12px;border-radius:6px;margin-bottom:16px;font-size:12px}</style></head><body><h1>🛡️ CRM GEHCH — Reporte de Reclamo</h1><div class='info'><strong>Cliente:</strong> "+cli?.nombre+" "+cli?.apellido+" | <strong>Póliza:</strong> "+pol?.numero+" | <strong>Ramo:</strong> "+pol?.ramo+"<br/><strong>N° Reclamo:</strong> "+(reclamo.numeroReclamo||"—")+" | <strong>Apertura:</strong> "+fmt(reclamo.fechaApertura)+" | <strong>Estado:</strong> "+reclamo.estado+"<br/><strong>Monto estimado:</strong> "+(reclamo.montoEstimado?moneda(reclamo.montoEstimado,pol?.moneda):"—")+" | <strong>Monto indemnizado:</strong> "+(reclamo.montoIndemnizado?moneda(reclamo.montoIndemnizado,pol?.moneda):"—")+"</div><h2>Checklist de Documentos ("+completados+"/"+checkItems.length+" completados)</h2><table><thead><tr><th>Documento</th><th>Estado</th><th>Fecha</th><th>Nota</th></tr></thead><tbody>"+rows+"</tbody></table><h2>Historial de Gestiones</h2><table><thead><tr><th>Fecha</th><th>Acción</th><th>Detalle</th></tr></thead><tbody>"+hist+"</tbody></table><script>window.onload=function(){window.print();}<\/script></body></html>");
    win.document.close();
  };

  return (
    <Modal titulo={"Reclamo — "+cli?.nombre+" "+cli?.apellido} onClose={onClose} wide>
      {/* Info header */}
      <div style={{background:"#f8f9fa",borderRadius:10,padding:"12px 16px",marginBottom:16,fontSize:12}}>
        <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div><strong>{pol?.ramo}</strong> · {pol?.numero} · {reclamo.tipoSiniestro}</div>
          <div>N° Reclamo: <strong>{reclamo.numeroReclamo||"—"}</strong></div>
          <div>Apertura: <strong>{fmt(reclamo.fechaApertura)}</strong></div>
          <Badge t={reclamo.estado}/>
        </div>
        {/* Barra progreso */}
        <div style={{marginTop:10}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4}}>
            <span>Documentos completados</span><span style={{fontWeight:700,color:pct===100?"#16a34a":"#d97706"}}>{completados}/{checkItems.length} ({pct}%)</span>
          </div>
          <div style={{height:8,background:"#e5e7eb",borderRadius:4}}><div style={{height:8,background:pct===100?"#16a34a":"#d97706",borderRadius:4,width:pct+"%",transition:"width .3s"}}/></div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:16}}>
        {[{k:"checklist",l:"📋 Checklist"},{k:"historial",l:"📞 Historial"},{k:"reporte",l:"📊 Reporte"}].map(t=>(
          <button key={t.k} onClick={()=>setTab(t.k)} style={{padding:"7px 14px",borderRadius:8,border:"1.5px solid",fontSize:12,fontWeight:600,cursor:"pointer",borderColor:tab===t.k?"#0a1628":"#e5e7eb",background:tab===t.k?"#0a1628":"#fff",color:tab===t.k?"#fff":"#555"}}>{t.l}</button>
        ))}
        <button onClick={addGoogleCal} style={{padding:"7px 14px",borderRadius:8,border:"1px solid #4285f4",background:"#fff",color:"#4285f4",cursor:"pointer",fontSize:12,fontWeight:700,marginLeft:"auto"}}>📅 Google Cal</button>
      </div>

      {/* Checklist */}
      {tab==="checklist"&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
        {checkItems.map(item=>{
          const c = reclamo.checklist?.[item];
          return (
            <div key={item} style={{background:c?.completado?"#f0fdf4":"#fff",border:`1.5px solid ${c?.completado?"#bbf7d0":"#e5e7eb"}`,borderRadius:9,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
              <input type="checkbox" checked={c?.completado||false} onChange={()=>toggleCheck(item)} style={{width:16,height:16,cursor:"pointer"}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:c?.completado?"#16a34a":"#0a0a1a",textDecoration:c?.completado?"line-through":""}}>{item}</div>
                {c?.completado&&c?.fecha&&<div style={{fontSize:11,color:"#888"}}>Recibido: {fmt(c.fecha)}</div>}
              </div>
              {c?.completado&&<span style={{fontSize:12,color:"#16a34a",fontWeight:700}}>✅</span>}
              {!c?.completado&&<span style={{fontSize:12,color:"#dc2626",fontWeight:700}}>⏳</span>}
            </div>
          );
        })}
      </div>}

      {/* Historial */}
      {tab==="historial"&&<div>
        <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14,maxHeight:280,overflowY:"auto"}}>
          {(reclamo.historial||[]).slice().reverse().map((h,i)=>(
            <div key={i} style={{background:"#f8f9fa",borderRadius:8,padding:"10px 14px",borderLeft:"3px solid #6366f1"}}>
              <div style={{fontSize:11,color:"#888",marginBottom:3}}>{fmt(h.fecha)} · {h.accion}</div>
              <div style={{fontSize:13,color:"#0a0a1a"}}>{h.nota}</div>
            </div>
          ))}
          {(reclamo.historial||[]).length===0&&<p style={{color:"#bbb",textAlign:"center",padding:16,fontSize:13}}>No hay gestiones registradas.</p>}
        </div>
        <div style={{display:"flex",gap:8}}>
          <input value={nota} onChange={e=>setNota(e.target.value)} placeholder="Registrar gestión, llamada, correo enviado..." style={{flex:1,padding:"8px 12px",border:"1.5px solid #e5e7eb",borderRadius:8,fontSize:13,outline:"none"}}/>
          <Btn onClick={agregarHistorial}><Icon n="plus" size={13}/> Agregar</Btn>
        </div>
      </div>}

      {/* Reporte Siniestralidad */}
      {tab==="reporte"&&<div>
        <div style={{background:"#f0f9ff",borderRadius:10,padding:16,marginBottom:14,border:"1px solid #bae6fd"}}>
          <div style={{fontSize:14,fontWeight:700,color:"#0369a1",marginBottom:12}}>📊 Resumen de Siniestralidad</div>
          {[
            ["Cliente",cli?.nombre+" "+cli?.apellido],
            ["Póliza",pol?.numero+" · "+pol?.ramo],
            ["Aseguradora",pol?.aseguradora],
            ["Prima anual",moneda(pol?.prima,pol?.moneda)],
            ["Monto estimado",reclamo.montoEstimado?moneda(reclamo.montoEstimado,pol?.moneda):"—"],
            ["Monto indemnizado",reclamo.montoIndemnizado?moneda(reclamo.montoIndemnizado,pol?.moneda):"—"],
            ["Índice siniestralidad",pol?.prima>0&&reclamo.montoIndemnizado?(reclamo.montoIndemnizado/pol?.prima*100).toFixed(1)+"%":"—"],
            ["Estado del reclamo",reclamo.estado],
            ["Resultado",reclamo.resultado||"—"],
          ].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #e0f2fe"}}>
              <span style={{fontSize:13,color:"#555"}}>{k}</span>
              <span style={{fontSize:13,fontWeight:700,color:"#0a0a1a"}}>{v}</span>
            </div>
          ))}
        </div>
        <button onClick={imprimirReporte} style={{width:"100%",padding:"10px",background:"#0a1628",color:"#fff",border:"none",borderRadius:9,fontSize:13,fontWeight:700,cursor:"pointer"}}>🖨️ Imprimir Reporte Completo</button>
      </div>}

      <div style={{display:"flex",justifyContent:"flex-end",marginTop:16}}>
        <Btn sec onClick={onClose}>Cerrar</Btn>
      </div>
    </Modal>
  );
}

// ═══ CUMPLEAÑOS ══════════════════════════════════════════════════════════════
function Cumpleanios({ clientes }) {
  const MESES=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const con=clientes.filter(c=>c.nacimiento);
  const ordenados=[...con].sort((a,b)=>{ const ra=(d=>d<0?d+365:d)(diasHasta(cumpleAnio(a.nacimiento))); const rb=(d=>d<0?d+365:d)(diasHasta(cumpleAnio(b.nacimiento))); return ra-rb; });
  return (
    <div>
      <div style={{marginBottom:18}}><h2 style={{fontSize:22,fontWeight:900,color:"#0a0a1a",margin:0}}>Cumpleaños</h2><p style={{color:"#888",fontSize:12,margin:"2px 0 0"}}>Fechas de nacimiento de todos los clientes</p></div>
      {ordenados.length===0?<div style={{background:"#fff",borderRadius:14,padding:40,textAlign:"center",color:"#ccc"}}>No hay cumpleaños registrados.</div>:
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:10}}>
        {ordenados.map(c=>{ const fc=cumpleAnio(c.nacimiento); const d=diasHasta(fc); const [,m,dia]=c.nacimiento.split("-"); const hoyEs=d===0; const prox=d>=0&&d<=7; const ac=hoyEs?"#ec4899":prox?"#d97706":"#6366f1";
          return <div key={c.id} style={{background:"#fff",borderRadius:13,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.04)",border:`2px solid ${hoyEs?"#ec4899":prox?"#fde68a":"#f0f0f0"}`}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:46,height:46,borderRadius:11,background:ac+"18",color:ac,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <div style={{fontSize:15,fontWeight:900,lineHeight:1}}>{dia}</div>
                <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase"}}>{MESES[Number(m)-1]}</div>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14,color:"#0a0a1a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.nombre} {c.apellido}</div>
                <div style={{fontSize:11,color:"#888"}}>{edadAnios(c.nacimiento)} · {c.telPrincipal||c.email||""}</div>
                <div style={{fontSize:11,fontWeight:700,color:ac,marginTop:2}}>{hoyEs?"🎂 ¡Hoy!":d<0?`Fue hace ${Math.abs(d)}d`:d===1?"🎁 Mañana":`En ${d} días`}</div>
              </div>
            </div>
          </div>;
        })}
      </div>}
    </div>
  );
}

// ═══ MODAL UNIDADES ═════════════════════════════════════════════════════════
function ModalUnidades({ pol, unidades, setUnidades, onClose }) {
  const campos = getCampos(pol.ramo);
  const mias = unidades.filter(u=>u.polizaId===pol.id);
  const [formU, setFormU] = useState({});
  const FU=(k,v)=>setFormU(f=>({...f,[k]:v}));

  const agregar=()=>{
    const vacio=campos.find(c=>!formU[c.k]);
    if(vacio){ alert("Complete el campo: "+vacio.l); return; }
    setUnidades(prev=>[...prev,{...formU,id:Date.now(),polizaId:pol.id,ramo:pol.ramo}]);
    setFormU({});
  };

  const excluir=(u)=>{
    if(window.confirm("Eliminar esta unidad de la poliza "+pol.numero+"?"))
      setUnidades(prev=>prev.filter(x=>x.id!==u.id));
  };

  return(
    <Modal titulo={"Unidades Aseguradas - "+pol.numero} onClose={onClose} wide>
      <div style={{marginBottom:12,padding:"8px 14px",background:"#f0f4ff",borderRadius:8,fontSize:12}}>
        <strong>{pol.aseguradora}</strong> &middot; {pol.ramo} &middot; {mias.length} unidad(es) registrada(s)
      </div>

      {mias.length===0&&<div style={{padding:24,textAlign:"center",color:"#ccc",fontSize:13,marginBottom:12}}>No hay unidades registradas para esta poliza.</div>}

      {mias.length>0&&<div style={{overflowX:"auto",marginBottom:14}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"#0a1628",color:"#fff"}}>
            {campos.map(c=><th key={c.k} style={{padding:"8px 12px",textAlign:"left",fontWeight:600,fontSize:11}}>{c.l}</th>)}
            <th style={{padding:"8px 12px",width:80,textAlign:"center",fontSize:11}}>Accion</th>
          </tr></thead>
          <tbody>{mias.map((u,i)=>(
            <tr key={u.id} style={{background:i%2?"#f8f9fa":"#fff",borderBottom:"1px solid #eee"}}>
              {campos.map(c=><td key={c.k} style={{padding:"8px 12px",fontSize:12}}>{u[c.k]||"--"}</td>)}
              <td style={{padding:"8px 12px",textAlign:"center"}}>
                <button onClick={()=>excluir(u)} style={{background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>Excluir</button>
              </td>
            </tr>
          ))}</tbody>
        </table>
      </div>}

      <div style={{borderTop:"1px solid #eee",paddingTop:14}}>
        <div style={{fontSize:11,fontWeight:700,color:"#0a1628",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Agregar unidad</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"flex-end"}}>
          {campos.map(c=>(
            <div key={c.k} style={{flex:1,minWidth:90}}>
              <label style={{fontSize:10,color:"#888",display:"block",marginBottom:2}}>{c.l}</label>
              <input value={formU[c.k]||""} onChange={e=>FU(c.k,e.target.value)} placeholder={c.l}
                style={{width:"100%",padding:"7px 9px",border:"1.5px solid #e5e7eb",borderRadius:6,fontSize:11,outline:"none",boxSizing:"border-box"}}/>
            </div>
          ))}
          <button onClick={agregar}
            style={{padding:"7px 16px",background:"#0a1628",color:"#fff",border:"none",borderRadius:6,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
            Agregar
          </button>
        </div>
      </div>

      <div style={{display:"flex",justifyContent:"flex-end",marginTop:14}}>
        <Btn sec onClick={onClose}>Cerrar</Btn>
      </div>
    </Modal>
  );
}

// ═══ CUENTAS X COBRAR ════════════════════════════════════════════════════════
function SeccionCxC({ clientes, polizas, planes, gestionesCxC, setGestionesCxC }) {
  const [diasFiltro, setDiasFiltro] = useState(30);
  const [modalGestion, setModalGestion] = useState(null);
  const [formG, setFormG] = useState({});
  const FG = (k,v) => setFormG(f=>({...f,[k]:v}));

  // Obtener gestión de una cuota
  const getGestion = (cuotaId) => gestionesCxC.find(g=>g.cuotaId===cuotaId) || {fechaContacto:"",promesaPago:"",nota:"",estado:"Pendiente"};

  // Guardar gestión
  const guardarGestion = () => {
    if(!modalGestion) return;
    setGestionesCxC(prev=>[
      ...prev.filter(g=>g.cuotaId!==modalGestion.id),
      {...formG, cuotaId:modalGestion.id, actualizado:hoy()}
    ]);
    setModalGestion(null);
  };

  const abrirGestion = (cu) => {
    setFormG({...getGestion(cu.id), cuotaId:cu.id});
    setModalGestion(cu);
  };

  // Filtrar cuotas: vencidas + por vencer en N días
  const cuotasPendientes = planes.filter(cu=>{
    if(cu.estado==="Pagado") return false;
    const d = diasHasta(cu.fecha);
    return d < 0 || (d >= 0 && d <= diasFiltro);
  }).sort((a,b)=>diasHasta(a.fecha)-diasHasta(b.fecha));

  // Agrupar por cliente
  const porCliente = {};
  cuotasPendientes.forEach(cu=>{
    const pol = polizas.find(p=>p.id===cu.polizaId);
    if(!pol) return;
    const cli = clientes.find(c=>c.id===pol.clienteId);
    if(!cli) return;
    const cliId = cli.id;
    if(!porCliente[cliId]) porCliente[cliId] = {cli, cuotas:[]};
    porCliente[cliId].cuotas.push({...cu, pol});
  });

  // Ordenar: primero los que tienen vencidas
  const clientesOrdenados = Object.values(porCliente).sort((a,b)=>{
    const aVenc = a.cuotas.filter(c=>diasHasta(c.fecha)<0).length;
    const bVenc = b.cuotas.filter(c=>diasHasta(c.fecha)<0).length;
    if(bVenc !== aVenc) return bVenc - aVenc;
    return a.cli.nombre.localeCompare(b.cli.nombre);
  });

  // Totales
  const totalVencidoRD = cuotasPendientes.filter(c=>diasHasta(c.fecha)<0&&polizas.find(p=>p.id===c.polizaId)?.moneda==="RD$").reduce((a,c)=>a+(c.monto||0),0);
  const totalVencidoUSD = cuotasPendientes.filter(c=>diasHasta(c.fecha)<0&&polizas.find(p=>p.id===c.polizaId)?.moneda==="USD").reduce((a,c)=>a+(c.monto||0),0);
  const totalProxRD = cuotasPendientes.filter(c=>diasHasta(c.fecha)>=0&&polizas.find(p=>p.id===c.polizaId)?.moneda==="RD$").reduce((a,c)=>a+(c.monto||0),0);
  const totalProxUSD = cuotasPendientes.filter(c=>diasHasta(c.fecha)>=0&&polizas.find(p=>p.id===c.polizaId)?.moneda==="USD").reduce((a,c)=>a+(c.monto||0),0);

  const imprimirCxC = () => {
    const win = window.open("","_blank");
    if(!win){alert("Permite ventanas emergentes.");return;}
    const filas = clientesOrdenados.map(({cli,cuotas})=>{
      const vencidas = cuotas.filter(c=>diasHasta(c.fecha)<0);
      const proximas = cuotas.filter(c=>diasHasta(c.fecha)>=0);
      const totalCliRD = cuotas.filter(c=>c.pol.moneda==="RD$").reduce((a,c)=>a+c.monto,0);
      const totalCliUSD = cuotas.filter(c=>c.pol.moneda==="USD").reduce((a,c)=>a+c.monto,0);
      const filasCuotas = cuotas.map(cu=>{
        const d = diasHasta(cu.fecha);
        const g = getGestion(cu.id);
        const urgente = d<0;
        return "<tr style='background:"+(urgente?"#fff5f5":"#fff")+"'>"+
          "<td style='padding:5px 8px;font-size:10px;'>"+cu.pol.aseguradora+"</td>"+
          "<td style='padding:5px 8px;font-size:10px;'>"+cu.pol.ramo+"</td>"+
          "<td style='padding:5px 8px;font-size:10px;'>"+cu.pol.numero+"</td>"+
          "<td style='padding:5px 8px;font-size:10px;'>Cuota "+cu.numero+"/"+cu.total+"</td>"+
          "<td style='padding:5px 8px;font-size:10px;'>"+fmt(cu.fecha)+"</td>"+
          "<td style='padding:5px 8px;font-size:10px;font-weight:700;color:"+(urgente?"#dc2626":"#d97706")+"'>"+
            (d<0?"Vencida hace "+Math.abs(d)+"d":"En "+d+"d")+"</td>"+
          "<td style='padding:5px 8px;font-size:10px;font-weight:700;'>"+moneda(cu.monto,cu.pol.moneda)+"</td>"+
          "<td style='padding:5px 8px;font-size:10px;color:#6366f1;'>"+(g.promesaPago?fmt(g.promesaPago):"—")+"</td>"+
          "<td style='padding:5px 8px;font-size:10px;color:#555;'>"+(g.nota||"—")+"</td>"+
          "</tr>";
      }).join("");
      return "<tr style='background:#f0f4ff;'><td colspan='9' style='padding:8px 10px;font-weight:700;font-size:11px;color:#0a1628;border-top:2px solid #dde3ee;'>"+
        "👤 "+cli.nombre+" "+cli.apellido+" · 📞 "+(cli.telPrincipal||"—")+
        " | Total pendiente: "+(totalCliRD>0?moneda(totalCliRD,"RD$")+" ":"")+
        (totalCliUSD>0?moneda(totalCliUSD,"USD"):"")+"</td></tr>"+filasCuotas;
    }).join("");
    win.document.write("<!DOCTYPE html><html><head><meta charset='UTF-8'/>"+
      "<title>Cuentas x Cobrar — GEHCH</title>"+
      "<style>body{font-family:Arial;padding:24px;font-size:11px}h1{color:#0a1628;font-size:15px}"+
      "table{width:100%;border-collapse:collapse;margin-top:10px}"+
      "th{background:#0a1628;color:#fff;padding:7px 8px;font-size:10px;text-align:left}"+
      "td{border-bottom:1px solid #eee}.res{display:flex;gap:12px;margin:10px 0;flex-wrap:wrap}"+
      ".ri{background:#f8f9fa;padding:10px 14px;border-radius:6px;border-left:4px solid #0a1628;min-width:140px}"+
      ".ri.rojo{border-left-color:#dc2626}.ri.naranja{border-left-color:#d97706}</style></head><body>"+
      "<h1>💰 GEHCH — Reporte de Cuentas x Cobrar</h1>"+
      "<p style='color:#888;font-size:10px'>Generado: "+new Date().toLocaleDateString("es-DO",{year:"numeric",month:"long",day:"numeric"})+" · gherrera@gehchseguros.com · (809) 284-7898</p>"+
      "<div class='res'>"+
      "<div class='ri rojo'><div style='font-size:9px;color:#888;'>VENCIDO RD$</div><div style='font-size:16px;font-weight:800;color:#dc2626;'>"+moneda(totalVencidoRD,"RD$")+"</div></div>"+
      "<div class='ri rojo'><div style='font-size:9px;color:#888;'>VENCIDO USD</div><div style='font-size:16px;font-weight:800;color:#dc2626;'>"+moneda(totalVencidoUSD,"USD")+"</div></div>"+
      "<div class='ri naranja'><div style='font-size:9px;color:#888;'>POR VENCER RD$</div><div style='font-size:16px;font-weight:800;color:#d97706;'>"+moneda(totalProxRD,"RD$")+"</div></div>"+
      "<div class='ri naranja'><div style='font-size:9px;color:#888;'>POR VENCER USD</div><div style='font-size:16px;font-weight:800;color:#d97706;'>"+moneda(totalProxUSD,"USD")+"</div></div>"+
      "<div class='ri'><div style='font-size:9px;color:#888;'>CLIENTES</div><div style='font-size:16px;font-weight:800;color:#0a1628;'>"+clientesOrdenados.length+"</div></div>"+
      "</div>"+
      "<table><thead><tr><th>Aseguradora</th><th>Ramo</th><th>N° Póliza</th><th>Cuota</th><th>Vencimiento</th><th>Estado</th><th>Monto</th><th>Promesa Pago</th><th>Nota Gestión</th></tr></thead>"+
      "<tbody>"+filas+"</tbody></table>"+
      "<script>window.onload=function(){window.print();}<\/script></body></html>");
    win.document.close();
  };

  const ESTADOS_CXC = ["Pendiente","Contactado","Promesa de pago","En mora","Incobrable"];
  const COLOR_CXC = {"Pendiente":"#6b7280","Contactado":"#0ea5e9","Promesa de pago":"#16a34a","En mora":"#d97706","Incobrable":"#dc2626"};

  return (
    <div>
      {/* Encabezado */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <div>
          <h3 style={{fontSize:16,fontWeight:700,color:"#0a0a1a",margin:"0 0 4px"}}>💰 Cuentas x Cobrar</h3>
          <p style={{color:"#888",fontSize:13,margin:0}}>Cuotas vencidas y próximas a vencer — ordenadas por urgencia</p>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:"#888"}}>Por vencer:</span>
          {[15,30,60].map(d=>(
            <button key={d} onClick={()=>setDiasFiltro(d)} style={{padding:"6px 14px",borderRadius:99,border:"1.5px solid",fontSize:12,fontWeight:600,cursor:"pointer",borderColor:diasFiltro===d?"#0a1628":"#e5e7eb",background:diasFiltro===d?"#0a1628":"#fff",color:diasFiltro===d?"#fff":"#555"}}>{d}d</button>
          ))}
          <button onClick={imprimirCxC} style={{padding:"8px 16px",borderRadius:8,background:"#0a1628",color:"#fff",border:"none",cursor:"pointer",fontSize:12,fontWeight:700}}>🖨️ Imprimir</button>
        </div>
      </div>

      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10,marginBottom:16}}>
        {[
          {l:"Vencido RD$",v:moneda(totalVencidoRD,"RD$"),c:"#dc2626"},
          {l:"Vencido USD",v:moneda(totalVencidoUSD,"USD"),c:"#dc2626"},
          {l:"Por vencer RD$",v:moneda(totalProxRD,"RD$"),c:"#d97706"},
          {l:"Por vencer USD",v:moneda(totalProxUSD,"USD"),c:"#d97706"},
          {l:"Clientes",v:clientesOrdenados.length,c:"#0a1628"},
        ].map(k=>(
          <div key={k.l} style={{background:"#fff",borderRadius:10,padding:"10px 14px",border:"1.5px solid #f0f0f0",borderLeft:"4px solid "+k.c}}>

      </div>

      {/* Lista por cliente */}
      {clientesOrdenados.length===0&&<div style={{padding:32,textAlign:"center",color:"#ccc",background:"#fff",borderRadius:14,border:"1px solid #f0f0f0"}}>✅ No hay cuotas vencidas ni por vencer en {diasFiltro} días</div>}

      {clientesOrdenados.map(({cli,cuotas})=>{

        const proximas = cuotas.filter(c=>diasHasta(c.fecha)>=0);
        const totalCliRD = cuotas.filter(c=>c.pol.moneda==="RD$").reduce((a,c)=>a+c.monto,0);

                <div style={{fontWeight:700,fontSize:14,color:"#0a0a1a"}}>{cli.nombre} {cli.apellido}</div>

                <Inp type="date" value={formG.fechaContacto||""} onChange={e=>FG("fechaContacto",e.target.value)}/>

            <Row>

                <Txta value={formG.nota||""} onChange={e=>FG("nota",e.target.value)} placeholder="Ej: Cliente confirmó pago para el viernes 14..."/>

            </Row>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>

        );
      })()}
    </div>
  );
}

const COLOR_RENOV = {"Pendiente contacto":"#6b7280","Contactado":"#0ea5e9","En negociación":"#d97706","Oferta enviada":"#6366f1","Renovada":"#16a34a","No renovada":"#dc2626"};

  const FG = (k,v) => setFormG(f=>({...f,[k]:v}));
  const getGestion = (polizaId) => gestionesRenov.find(g=>g.polizaId===polizaId) || {estado:"Pendiente contacto",nota:"",fechaContacto:"",fechaProxima:""};
  const abrirGestion = (p) => { setFormG({...getGestion(p.id), polizaId:p.id}); setModalGestion(p); };
  const guardarGestion = () => { if(!modalGestion) return; setGestionesRenov(prev=>[...prev.filter(g=>g.polizaId!==modalGestion.id),{...formG,polizaId:modalGestion.id,actualizado:hoy()}]); setModalGestion(null); };
  
  const porRenovar = polizas.filter(p=>{ const d=diasHasta(p.fin); return d>=-30&&d<=diasFiltro&&(p.estado==="Vigente"||p.estado==="Por Renovar"||p.estado==="Vencida"); }).sort((a,b)=>diasHasta(a.fin)-diasHasta(b.fin));
  const resumen = ESTADOS_RENOV.map(e=>({estado:e,n:porRenovar.filter(p=>getGestion(p.id).estado===e).length}));

    }).join("");

          <button onClick={imprimirRenovaciones} style={{padding:"8px 16px",borderRadius:8,background:"#0a1628",color:"#fff",border:"none",cursor:"pointer",fontSize:12,fontWeight:700}}>🖨️ Imprimir</button>

      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {porRenovar.map(p=>{ const cli=clientes.find(c=>c.id===p.clienteId); const d=diasHasta(p.fin); const g=getGestion(p.id); const vencida=d<0; const urgente=d>=0&&d<=30;
          return (<div key={p.id} style={{background:"#fff",borderRadius:12,padding:"14px 18px",border:"1.5px solid "+(g.estado==="Renovada"?"#bbf7d0":g.estado==="No renovada"?"#fecaca":vencida?"#fecaca":urgente?"#fecaca":"#fde68a"),display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:200}}>

              <div style={{fontSize:11,color:"#aaa",marginTop:1}}>📞 {cli?.telPrincipal||"—"} · Vence: {fmt(p.fin)}</div>
              {g.nota&&<div style={{fontSize:11,color:"#6366f1",marginTop:3,fontStyle:"italic"}}>📝 {g.nota}</div>}
              {g.fechaProxima&&<div style={{fontSize:11,color:"#d97706",marginTop:2}}>📅 Próx. acción: {fmt(g.fechaProxima)}</div>}

            <div style={{textAlign:"center",minWidth:50}}><div style={{fontSize:22,fontWeight:900,color:vencida?"#dc2626":urgente?"#dc2626":"#d97706"}}>{Math.abs(d)}</div><div style={{fontSize:9,color:"#888"}}>{vencida?"días atrás":"días"}</div></div>
            <div style={{textAlign:"right",minWidth:90}}><div style={{fontSize:13,fontWeight:700}}>{moneda(p.prima,p.moneda)}</div><div style={{fontSize:11,color:"#888"}}>prima</div></div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
              <span style={{padding:"4px 10px",borderRadius:99,fontSize:11,fontWeight:700,background:COLOR_RENOV[g.estado]+"22",color:COLOR_RENOV[g.estado],border:"1px solid "+COLOR_RENOV[g.estado]+"44"}}>{g.estado}</span>
              <button onClick={()=>abrirGestion(p)} style={{padding:"5px 12px",borderRadius:7,border:"1.5px solid #6366f1",background:"#fff",color:"#6366f1",cursor:"pointer",fontSize:11,fontWeight:700}}>✏️ Gestionar</button>
            </div>
          </div>);

        {porRenovar.length===0&&<div style={{padding:32,textAlign:"center",color:"#ccc",background:"#fff",borderRadius:14}}>✅ No hay pólizas por vencer en los próximos {diasFiltro} días</div>}

      {modalGestion&&<Modal titulo={"Gestión — "+(clientes.find(c=>c.id===modalGestion.clienteId)?.nombre||"")} onClose={()=>setModalGestion(null)}>
        <div style={{marginBottom:10,padding:"8px 12px",background:"#f8f9fa",borderRadius:8,fontSize:12}}><strong>{modalGestion.ramo}</strong> · {modalGestion.aseguradora} · {modalGestion.numero} · Vence: {fmt(modalGestion.fin)}</div>
        <Row><Campo label="Estado de gestión"><Sel value={formG.estado||"Pendiente contacto"} onChange={e=>FG("estado",e.target.value)}>{ESTADOS_RENOV.map(e=><option key={e}>{e}</option>)}</Sel></Campo></Row>

function Reportes({ clientes,polizas,planes,gestionesRenov=[],setGestionesRenov=()=>{},gestionesCxC=[],setGestionesCxC=()=>{} }) {
  const [subPag, setSubPag] = useState("resumen"); const [estadoCuenta, setEstadoCuenta] = useState(false);
  const [anioFiltro, setAnioFiltro] = useState("todos");
  const [expandida, setExpandida] = useState(null);

  const vigentes=polizas.filter(p=>p.estado==="Vigente");
  const porVencer=polizas.filter(p=>{ const d=diasHasta(p.fin); return d>=0&&d<=60&&p.estado!=="Cancelada"; });
  const porVencer30=polizas.filter(p=>{ const d=diasHasta(p.fin); return d>=0&&d<=30&&p.estado!=="Cancelada"; });
  const porVencer60=polizas.filter(p=>{ const d=diasHasta(p.fin); return d>=0&&d<=60&&p.estado!=="Cancelada"; });
  const porVencer90=polizas.filter(p=>{ const d=diasHasta(p.fin); return d>=0&&d<=90&&p.estado!=="Cancelada"; });
  const totalPrimasRD=vigentes.filter(p=>p.moneda==="RD$").reduce((a,p)=>a+p.prima,0);
  const totalPrimasUSD=vigentes.filter(p=>p.moneda==="USD").reduce((a,p)=>a+p.prima,0);
  const totalComisiones=vigentes.reduce((a,p)=>a+(p.prima*(p.comision||0)/100),0);
  const cuotasPagadas=planes.filter(p=>p.estado==="Pagado");
  const sinPoliza=clientes.filter(c=>!polizas.some(p=>p.clienteId===c.id&&p.estado==="Vigente"));

  // ── Cartera por Aseguradora ──────────────────────────────────────────────
  const anios=[...new Set([...polizas.map(p=>p.inicio?p.inicio.split("-")[0]:""),...polizas.map(p=>p.fin?p.fin.split("-")[0]:"")]  )].filter(Boolean).sort().reverse();
  const polizasVigentes = polizas.filter(p=>p.estado==="Vigente"||p.estado==="Por Renovar");
  const polizasFiltradas = anioFiltro==="todos" ? polizasVigentes : polizasVigentes.filter(p=>(p.inicio&&p.inicio.startsWith(anioFiltro))||(p.fin&&p.fin.startsWith(anioFiltro)));

  const aseguradoras=[...new Set(polizas.map(p=>p.aseguradora))].filter(Boolean).sort();

  const cartPorAseg = aseguradoras.map(aseg=>{
    const pols=polizasFiltradas.filter(p=>p.aseguradora===aseg);
    const vigPols=pols.filter(p=>p.estado==="Vigente");
    const clientesSet=new Set(pols.map(p=>p.clienteId));
    const primaRD=pols.filter(p=>p.moneda==="RD$").reduce((a,p)=>a+p.prima,0);
    const primaUSD=pols.filter(p=>p.moneda==="USD").reduce((a,p)=>a+p.prima,0);
    const comisionRD=pols.filter(p=>p.moneda==="RD$").reduce((a,p)=>a+(p.prima*(p.comision||0)/100),0);
    const comisionUSD=pols.filter(p=>p.moneda==="USD").reduce((a,p)=>a+(p.prima*(p.comision||0)/100),0);
    const detalle=pols.map(p=>{ const cli=clientes.find(c=>c.id===p.clienteId); return {...p,cliente:cli}; });
    return { aseguradora:aseg, totalPolizas:pols.length, vigentes:vigPols.length, clientes:clientesSet.size, primaRD, primaUSD, comisionRD, comisionUSD, detalle };
  }).filter(a=>a.totalPolizas>0).sort((a,b)=>b.totalPolizas-a.totalPolizas);

  const totalGenPols=cartPorAseg.reduce((a,x)=>a+x.totalPolizas,0);
  const totalGenRD=cartPorAseg.reduce((a,x)=>a+x.primaRD,0);
  const totalGenUSD=cartPorAseg.reduce((a,x)=>a+x.primaUSD,0);
  const totalGenComRD=cartPorAseg.reduce((a,x)=>a+x.comisionRD,0);
  const totalGenComUSD=cartPorAseg.reduce((a,x)=>a+x.comisionUSD,0);
  const maxPols=Math.max(...cartPorAseg.map(x=>x.totalPolizas),1);

  const imprimirCartera=()=>{
    const win=window.open("","_blank");
    const filas=cartPorAseg.map(a=>(
      "<tr>" +
      "<td>" + a.aseguradora + "</td>" +
      "<td style='text-align:center'>" + a.clientes + "</td>" +
      "<td style='text-align:center'>" + a.totalPolizas + "</td>" +
      "<td style='text-align:center'>" + a.vigentes + "</td>" +
      "<td style='text-align:right'>" + (a.primaRD>0?moneda(a.primaRD,"RD$"):"—") + "</td>" +
      "<td style='text-align:right'>" + (a.primaUSD>0?moneda(a.primaUSD,"USD"):"—") + "</td>" +
      "<td style='text-align:right'>" + (a.comisionRD>0?moneda(a.comisionRD,"RD$"):"—") + "</td>" +
      "<td style='text-align:right'>" + (a.comisionUSD>0?moneda(a.comisionUSD,"USD"):"—") + "</td>" +
      "</tr>"
    )).join("");
    const periodo = anioFiltro==="todos"?"Todos los años":anioFiltro;

      "<p>Periodo: " + periodo + " - Generado: " + fechaHoy + "</p>" +
      "<table><thead><tr>" +
      "<th>Aseguradora</th><th>Clientes</th><th>Polizas</th><th>Vigentes</th><th>Prima RD$</th><th>Prima USD</th><th>Comision RD$</th><th>Comision USD</th>" +
      "</tr></thead><tbody>" + filas +

      "<td style='text-align:center'><strong>" + clientes.length + "</strong></td>" +
      "<td style='text-align:center'><strong>" + totalGenPols + "</strong></td>" +
      "<td></td>" +
      "<td style='text-align:right'><strong>" + moneda(totalGenRD,"RD$") + "</strong></td>" +
      "<td style='text-align:right'><strong>" + moneda(totalGenUSD,"USD") + "</strong></td>" +
      "<td style='text-align:right'><strong>" + (totalGenComRD>0?moneda(totalGenComRD,"RD$"):"—") + " / " + (totalGenComUSD>0?moneda(totalGenComUSD,"USD"):"—") + "</strong></td>" +
      "</tr></tbody></table>" +
      "<script>window.onload=function(){window.print();}<\/script>" +
      "</body></html>";
    win.document.write(contenido);
    win.document.close();
  };

  const Stat=({label,val,color="#0a0a1a",sub})=>(
    <div style={{background:"#fff",borderRadius:11,padding:"14px 16px",border:"1px solid #f0f0f0",boxShadow:"0 1px 6px rgba(0,0,0,0.04)"}}>

      <div style={{fontSize:20,fontWeight:800,color}}>{val}</div>
      {sub&&<div style={{fontSize:11,color:"#aaa",marginTop:2}}>{sub}</div>}

  return (
    <div>
      {estadoCuenta&&<EstadoCuenta clientes={clientes} polizas={polizas} planes={planes} onClose={()=>setEstadoCuenta(false)}/>}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:10}}><div><h2 style={{fontSize:22,fontWeight:900,color:"#0a0a1a",margin:0}}>Reportes</h2><p style={{color:"#888",fontSize:12,margin:"2px 0 0"}}>Análisis y estadísticas de la cartera</p></div><Btn onClick={()=>setEstadoCuenta(true)}>📄 Estado de Cuenta por Cliente</Btn></div>

      {/* Tabs */}
      <div style={{display:"flex",gap:6,marginBottom:20,flexWrap:"wrap"}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setSubPag(t.id)} style={{padding:"8px 16px",borderRadius:99,border:"1.5px solid",fontSize:13,fontWeight:600,cursor:"pointer",borderColor:subPag===t.id?"#0a1628":"#e5e7eb",background:subPag===t.id?"#0a1628":"#fff",color:subPag===t.id?"#fff":"#555"}}>{t.label}</button>)}
      </div>

      {/* ── RESUMEN GENERAL ── */}
      {subPag==="resumen"&&<div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10,marginBottom:20}}>
          <Stat label="Total clientes" val={clientes.length}/>

          <Stat label="Por vencer (30d)" val={porVencer30.length} color="#dc2626"/>

          <Stat label="Comisiones est. RD$" val={moneda(vigentes.filter(p=>p.moneda==="RD$").reduce((a,p)=>a+(p.prima*(p.comision||0)/100),0),"RD$")} color="#6366f1"/><Stat label="Comisiones est. USD" val={moneda(vigentes.filter(p=>p.moneda==="USD").reduce((a,p)=>a+(p.prima*(p.comision||0)/100),0),"USD")} color="#8b5cf6"/>
